<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>dtd2</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F2F2EF;--border:#E3E2DE;
  --accent:#1D6AF5;--accent-lt:rgba(29,106,245,.09);
  --text:#1C1C1C;--muted:#8B8B8B;--muted2:#C4C4C0;
  --surface:rgba(255,255,255,.93);
  --sh-sm:0 1px 4px rgba(0,0,0,.07);
  --sh-md:0 4px 20px rgba(0,0,0,.10);
  --sh-lg:0 8px 36px rgba(0,0,0,.15);
  --RW:20px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;
  background:var(--bg);color:var(--text);height:100vh;overflow:hidden;
  display:flex;flex-direction:column;user-select:none;-webkit-user-select:none;
  -webkit-font-smoothing:antialiased}

/* ── TOP BAR ── */
.topbar{height:36px;background:var(--surface);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:5px;z-index:300;flex-shrink:0}
.logo{font-size:12px;font-weight:700;letter-spacing:-.5px;opacity:.45;margin-right:4px}
.tb-sep{flex:1}
.tb-chip{border:1px solid var(--border);background:none;border-radius:5px;
  padding:2px 8px;font-size:10.5px;font-weight:500;cursor:pointer;color:var(--muted);
  transition:background .12s,border-color .12s,color .12s;white-space:nowrap}
.tb-chip:hover,.tb-chip.on{background:var(--accent-lt);border-color:var(--accent);color:var(--accent)}
.tb-export{background:var(--text);color:#fff;border:none;border-radius:5px;
  padding:3px 10px;font-size:10.5px;font-weight:600;cursor:pointer;transition:opacity .12s}
.tb-export:hover{opacity:.76}

/* ── WORKSPACE ── */
.workspace{display:flex;flex:1;overflow:hidden;position:relative}

/* ── FLOATING TOOLBAR ── */
.toolbar{position:absolute;left:10px;top:50%;transform:translateY(-50%);
  background:var(--surface);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:12px;
  box-shadow:var(--sh-md);display:flex;flex-direction:column;
  align-items:center;padding:6px 4px;gap:1px;z-index:200;width:40px}
.tbtn{width:32px;height:32px;border:none;background:none;border-radius:8px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:background .1s,color .1s,transform .1s;position:relative;flex-shrink:0}
.tbtn:hover{background:rgba(0,0,0,.05);color:var(--text)}
.tbtn:active{transform:scale(.93)}
.tbtn.active{background:var(--accent);color:#fff}
.tbtn svg{width:15px;height:15px}
.tbtn[title]::after{content:attr(title);position:absolute;
  left:calc(100% + 10px);top:50%;transform:translateY(-50%);
  background:#1a1a1a;color:#fff;font-size:10.5px;padding:4px 8px;
  border-radius:6px;white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .15s .35s;z-index:9999}
.tbtn[title]:hover::after{opacity:1}
.tsep{width:20px;height:1px;background:var(--border);margin:3px 0}

/* ── CANVAS ── */
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg)}
#svg{position:absolute;inset:0;width:100%;height:100%}

/* ── STATUS BAR ── */
.statusbar{height:24px;background:var(--surface);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);display:flex;align-items:center;
  padding:0 12px;gap:12px;font-size:10px;color:var(--muted);flex-shrink:0}
.vsep{width:1px;height:10px;background:var(--border)}
.right{margin-left:auto;opacity:.5;font-size:9.5px;display:flex;gap:8px}
.kbd{background:#F0F0EE;border:1px solid var(--border);border-radius:3px;
  padding:0 4px;font-size:9px;font-family:monospace;color:var(--muted);line-height:16px}

/* ── CONTEXT MENU ── */
#ctx{position:absolute;background:#fff;border:1px solid var(--border);
  border-radius:10px;box-shadow:var(--sh-lg);padding:5px;z-index:600;
  display:none;min-width:168px;animation:ctxIn .11s cubic-bezier(.2,.8,.4,1)}
@keyframes ctxIn{from{opacity:0;transform:scale(.95) translateY(-4px)}to{opacity:1;transform:none}}
.ci{display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:12px;
  border-radius:7px;cursor:pointer;transition:background .08s}
.ci:hover{background:#F5F5F3}
.ci.danger{color:#C0392B}.ci.danger:hover{background:#FDF2F2}
.ci.disabled{opacity:.3;pointer-events:none}
.ci-kbd{margin-left:auto;font-size:9.5px;color:var(--muted2);font-family:monospace}
.ci svg{width:13px;height:13px;flex-shrink:0;opacity:.6}
.csep{height:1px;background:var(--border);margin:4px 0}

/* ── DIM INPUT ── */
#dim-overlay{position:absolute;display:none;z-index:700;pointer-events:auto}
#dim-inp{border:2px solid var(--accent);border-radius:6px;padding:3px 8px;
  font-size:12px;font-family:'SF Mono','Fira Code','Menlo',monospace;
  text-align:center;outline:none;background:#fff;box-shadow:var(--sh-md);width:78px}
#name-overlay{position:absolute;display:none;z-index:700;pointer-events:auto}
#name-inp{border:2px solid var(--accent);border-radius:6px;padding:3px 10px;
  font-size:12px;font-weight:600;letter-spacing:.04em;
  font-family:'SF Mono','Menlo',monospace;text-transform:uppercase;
  text-align:center;outline:none;background:#fff;box-shadow:var(--sh-md);width:150px}

/* ── SCENE BADGE ── */
#scene-badge{position:absolute;top:8px;right:10px;z-index:200;
  display:flex;gap:5px;align-items:center;
  background:var(--surface);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:8px;padding:5px 8px;
  box-shadow:var(--sh-sm);opacity:0;transform:translateY(-4px);
  transition:opacity .2s,transform .2s;pointer-events:none}
#scene-badge.open{opacity:1;transform:translateY(0);pointer-events:auto}
.sb-label{font-size:10px;color:var(--muted);font-weight:500}
.sb-chip{border:1px solid var(--border);background:none;border-radius:5px;
  padding:2px 7px;font-size:10.5px;font-weight:500;cursor:pointer;
  color:var(--muted);transition:all .12s}
.sb-chip:hover{background:var(--accent-lt);border-color:var(--accent);color:var(--accent)}
.sb-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── WALL MENU ── */
#wall-menu{position:absolute;z-index:500;display:none;
  background:#fff;border:1px solid var(--border);border-radius:10px;
  box-shadow:var(--sh-md);padding:6px;min-width:200px;
  animation:ctxIn .12s cubic-bezier(.2,.8,.4,1)}
.wm-title{font-size:9.5px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;padding:2px 4px 5px}
.wm-row{display:flex;gap:3px}
.wm-btn{flex:1;border:1.5px solid var(--border);background:none;border-radius:7px;
  padding:6px 4px;font-size:10px;font-weight:500;cursor:pointer;color:var(--muted);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:border-color .1s,background .1s,color .1s}
.wm-btn:hover{background:#F5F5F3;color:var(--text);border-color:#ccc}
.wm-btn.active{background:var(--accent-lt);color:var(--accent);border-color:var(--accent)}
.wm-preview{width:36px;height:6px;display:flex;align-items:center}
.wm-line{width:100%}

/* ── RADIAL DISC ── */
#disc-backdrop{position:absolute;inset:0;z-index:400;display:none}
#radial-disc{position:absolute;z-index:500;display:none;pointer-events:none}
.rd-center{position:absolute;top:-21px;left:-21px;width:42px;height:42px;
  border-radius:50%;background:rgba(255,255,255,.96);border:1px solid var(--border);
  box-shadow:0 4px 16px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;
  cursor:pointer;pointer-events:auto;font-size:8.5px;color:var(--muted);font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  animation:rdIn .22s cubic-bezier(.34,1.4,.64,1)}
@keyframes rdIn{from{opacity:0;transform:scale(.3)}to{opacity:1;transform:scale(1)}}
.rd-center:hover{border-color:var(--text);color:var(--text)}
.rd-item{position:absolute;top:0;left:0;pointer-events:none}
/* Bubble buttons — clean, monochrome, "sandbox" aesthetic */
.rd-bubble{pointer-events:auto;cursor:pointer;width:86px;height:86px;border-radius:50%;
  background:rgba(255,255,255,.97);backdrop-filter:blur(8px);
  border:1px solid var(--border);box-shadow:0 6px 22px rgba(0,0,0,.10);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  position:relative;
  transition:transform .16s cubic-bezier(.34,1.5,.5,1),box-shadow .16s,border-color .16s}
.rd-bubble:hover{transform:scale(1.09);border-color:#9A9A96;box-shadow:0 12px 34px rgba(0,0,0,.17)}
.rd-bubble:active{transform:scale(.95)}
.rb-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid #fff;
  box-shadow:0 0 0 1px rgba(0,0,0,.07)}
.rb-name{font-size:8.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
  color:#54534F;text-align:center;line-height:1.18;padding:0 7px;
  font-family:'SF Mono','Menlo',monospace}
.rb-pct{position:absolute;bottom:11px;font-size:8px;font-weight:700;
  font-family:'SF Mono','Menlo',monospace;opacity:.85}
.rb-ring{position:absolute;inset:-1px;border-radius:50%;pointer-events:none}

/* ── ANIMATIONS ── */
@keyframes march{to{stroke-dashoffset:-16}}
.preview-dash{animation:march .4s linear infinite}
.cand-dash{animation:march .7s linear infinite}
@keyframes shapeSpring{from{opacity:0;transform:scale(.55)}to{opacity:1;transform:scale(1)}}
.shape-spring{animation:shapeSpring .32s cubic-bezier(.34,1.56,.64,1) forwards;
  transform-box:fill-box;transform-origin:center center}
@keyframes predSpring{from{opacity:0;transform:scale(.2)}to{opacity:1;transform:scale(1)}}
.pred-spring{animation:predSpring .38s cubic-bezier(.34,1.56,.64,1) both;
  transform-box:fill-box;transform-origin:center center}
/* ── OPERATION HINT PILL ── */
#op-hint{position:absolute;z-index:800;pointer-events:none;display:none;
  background:#ECECEC;color:#3A3A3A;font-size:12px;font-weight:500;
  padding:5px 13px;border-radius:16px;box-shadow:0 2px 11px rgba(0,0,0,.13);
  white-space:nowrap;transform:translate(-50%,0)}
#op-hint .oh-sub{color:#9A9A9A;font-weight:400;margin-left:7px;font-size:11px}
/* ── PREDICTION % BREAKDOWN (middle-click a radial bubble) ── */
#pred-detail{position:absolute;z-index:650;display:none;pointer-events:none;
  background:#fff;border:1px solid var(--border);border-radius:10px;
  box-shadow:var(--sh-lg);padding:9px 11px;min-width:152px;max-width:192px;
  font-size:11px;animation:ctxIn .12s cubic-bezier(.2,.8,.4,1)}
#pred-detail .pd-h{display:flex;align-items:center;justify-content:space-between;gap:8px;
  font-weight:700;font-size:12px;margin-bottom:8px}
#pred-detail .pd-big{font-family:'SF Mono','Menlo',monospace}
#pred-detail .pd-row{margin:6px 0}
#pred-detail .pd-lbl{display:flex;justify-content:space-between;color:var(--muted);
  font-size:10px;margin-bottom:3px;font-family:'SF Mono','Menlo',monospace}
#pred-detail .pd-track{height:4px;border-radius:2px;background:#EDEDEA;overflow:hidden}
#pred-detail .pd-fill{height:100%;border-radius:2px}
#pred-detail .pd-note{margin-top:8px;padding-top:7px;border-top:1px solid var(--border);
  color:var(--muted);font-size:10px;line-height:1.35}
/* ── FLOATING EDIT BAR (below a selected rect; icons only) ── */
#floatbar{position:absolute;z-index:550;display:none;transform:translateX(-50%);
  background:#fff;border:1px solid var(--border);border-radius:9px;box-shadow:var(--sh-lg);
  padding:3px;align-items:center;gap:1px;animation:ctxIn .1s cubic-bezier(.2,.8,.4,1)}
#floatbar.show{display:flex}
.fb-btn{width:28px;height:28px;border:none;background:none;border-radius:6px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:#444;transition:background .1s,color .1s}
.fb-btn:hover{background:#F2F2EF;color:#000}
.fb-btn.danger:hover{background:#FDF2F2;color:#C0392B}
.fb-btn svg{width:15px;height:15px;pointer-events:none}
.fb-sep{width:1px;height:16px;background:var(--border);margin:0 2px}
#floatpal{position:absolute;z-index:560;display:none;transform:translateX(-50%);
  background:#fff;border:1px solid var(--border);border-radius:9px;box-shadow:var(--sh-lg);
  padding:7px;gap:5px;flex-wrap:wrap;max-width:184px}
#floatpal.show{display:flex}
.fp-chip{width:22px;height:22px;border-radius:6px;cursor:pointer;transition:transform .1s;padding:0}
.fp-chip:hover{transform:scale(1.14)}
.dim-hot{cursor:text}
.dim-hot:hover .dim-bg{fill:#FFF3E0}
.dim-hot:hover .dim-lbl{fill:#BF4A1E;text-decoration:underline;
  text-underline-offset:1.5px;text-decoration-color:rgba(191,74,30,.35)}

/* ── EXPLAIN PANEL (walks through how the algorithm works) ── */
#explain{position:absolute;top:0;right:0;width:344px;height:100%;background:#fff;
  border-left:1px solid var(--border);box-shadow:-4px 0 24px rgba(0,0,0,.06);z-index:250;
  display:flex;flex-direction:column;transform:translateX(100%);
  transition:transform .26s cubic-bezier(.3,.8,.4,1)}
#explain.open{transform:none}
.xp-head{display:flex;align-items:center;gap:8px;padding:11px 14px;
  border-bottom:1px solid var(--border);flex-shrink:0}
.xp-head .xp-t{font-size:13px;font-weight:700;letter-spacing:-.2px}
.xp-head .xp-s{font-size:10px;color:var(--muted);margin-top:1px}
.xp-demo{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:6px;
  padding:3px 10px;font-size:10.5px;font-weight:600;cursor:pointer;white-space:nowrap}
.xp-demo:hover{opacity:.85}
.xp-demo.stop{background:#C0392B;border-color:#C0392B}
.xp-x{border:none;background:none;cursor:pointer;color:var(--muted);font-size:18px;
  line-height:1;padding:1px 5px;border-radius:6px}
.xp-x:hover{background:#F2F2EF;color:var(--text)}
.xp-body{flex:1;overflow-y:auto;padding:14px}
.xp-narr{background:var(--accent-lt);border:1px solid rgba(29,106,245,.25);border-radius:9px;
  padding:10px 12px;font-size:12px;line-height:1.55;color:#1a3a6b;margin-bottom:15px;min-height:20px}
.xp-narr b{color:var(--accent)}
.xp-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--muted);margin:17px 0 9px;display:flex;align-items:center;gap:7px}
.xp-sec:first-child{margin-top:0}
.xp-sec .n{width:17px;height:17px;border-radius:50%;background:var(--text);color:#fff;
  font-size:9.5px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.xp-card{border:1px solid var(--border);border-radius:9px;padding:11px;margin-bottom:9px;background:#FBFBFA}
.xp-p{font-size:11.5px;line-height:1.55;color:#3a3a3a}
.xp-p+.xp-p{margin-top:7px}
.xp-mono{font-family:'SF Mono','Menlo',monospace;font-size:10.5px;background:#F2F2EF;
  border-radius:5px;padding:7px 9px;color:#333;line-height:1.55;white-space:pre-wrap;word-break:break-word;margin-top:7px}
.xp-row{display:flex;align-items:center;gap:8px;font-size:11px;margin:6px 0}
.xp-row .k{color:var(--muted);min-width:62px;font-family:'SF Mono','Menlo',monospace}
.xp-row .bar{flex:1;height:5px;border-radius:3px;background:#EDEDEA;overflow:hidden}
.xp-row .bar i{display:block;height:100%;border-radius:3px}
.xp-row .v{font-family:'SF Mono','Menlo',monospace;min-width:36px;text-align:right;font-weight:600}
.xp-pill{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;border:1px solid var(--border);
  border-radius:20px;padding:2px 9px;margin:5px 4px 0 0;background:#fff}
.xp-pill .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.xp-stat{display:flex;gap:8px;margin-bottom:10px}
.xp-stat .b{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 6px;text-align:center;background:#fff}
.xp-stat .b .num{font-size:17px;font-weight:700;font-family:'SF Mono','Menlo',monospace}
.xp-stat .b .lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-top:2px}
.xp-muted{font-size:10.5px;color:var(--muted);line-height:1.5}
.xp-step{display:flex;gap:9px;margin-bottom:10px;font-size:11.5px;line-height:1.45}
.xp-step:last-child{margin-bottom:0}
.xp-step .si{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);color:var(--muted);
  font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.xp-step.on .si{background:var(--accent);border-color:var(--accent);color:#fff}
.xp-step .sx b{color:var(--text)}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">dtd2</span>
  <div class="tb-sep"></div>
  <button class="tb-chip" id="btn-explain">Demo</button>
  <button class="tb-chip" id="btn-gen">Generate</button>
  <button class="tb-chip" id="btn-plan">Plan</button>
  <button class="tb-chip" id="btn-ft">unit</button>
  <button class="tb-chip" id="btn-clear">Clear</button>
</div>

<div class="workspace">
<div class="canvas-wrap" id="cwrap">
  <svg id="svg" xmlns="http://www.w3.org/2000/svg">
    <g id="L-grid"></g>
    <g id="L-world">
      <rect x="-200000" y="-200000" width="400000" height="400000" fill="white"/>
      <g id="L-shapes"></g>
      <g id="L-arch" style="pointer-events:none"></g>
      <g id="L-candidates"></g>
      <g id="L-preview"></g>
      <g id="L-dims"></g>
      <g id="L-handles"></g>
    </g>
    <g id="L-selbox"></g>
    <g id="L-snap"></g>
    <g id="L-rulers" style="pointer-events:none"></g>
  </svg>
  <div id="disc-backdrop"></div>
  <div id="radial-disc"><div class="rd-center" id="rd-center">+</div></div>
  <div id="wall-menu"></div>
  <div id="ctx"></div>
  <div id="floatbar"></div>
  <div id="floatpal"></div>
  <div id="op-hint"></div>
  <div id="pred-detail"></div>
  <div id="dim-overlay"><input id="dim-inp" type="text" autocomplete="off" spellcheck="false"/></div>
  <div id="name-overlay"><input id="name-inp" type="text" autocomplete="off" spellcheck="false" placeholder="Room name"/></div>
</div>
<div id="explain">
  <div class="xp-head">
    <div style="flex:1">
      <div class="xp-t">How it works</div>
      <div class="xp-s">dtd2 prediction + wall/door generation</div>
    </div>
    <button class="xp-demo" id="btn-xp-demo">▶ Demo</button>
    <button class="xp-x" id="btn-xp-close" title="Close (X)">×</button>
  </div>
  <div class="xp-body">
    <div class="xp-narr" id="xp-narr">Click <b>▶ Demo</b> for a full walkthrough — or draw rooms yourself, press <b>E</b> for predictions and <b>B</b> for walls. This panel explains what the algorithm is doing, live.</div>
    <div id="xp-pred"></div>
    <div id="xp-arch"></div>
  </div>
</div>
</div>

<div class="statusbar">
  <span id="s-tool">Select</span>
  <div class="vsep"></div>
  <span id="s-coords">0, 0</span>
  <div class="vsep"></div>
  <span id="s-zoom">100%</span>
  <div class="vsep"></div>
  <span id="s-count">0 shapes</span>
  <div class="right">
    <span><span class="kbd">E</span> rooms</span>
    <span><span class="kbd">B</span> plan</span>
    <span><span class="kbd">X</span> demo</span>
    <span><span class="kbd">T</span> unit</span>
    <span><span class="kbd">R</span> rect</span>
    <span><span class="kbd">Del</span> delete</span>
  </div>
</div>

<script>
'use strict';
// ─────────────────────────────────────────
//  SCENES
// ─────────────────────────────────────────
const SCENES={
  apartment:{name:'Apartment',startType:'living',types:{
    living:   {name:'Living Room', fill:'#DBEAFE',stroke:'#2563EB',wRange:[240,360],hRange:[180,260]},
    bedroom:  {name:'Bedroom',     fill:'#DCFCE7',stroke:'#16A34A',wRange:[180,260],hRange:[160,220]},
    bathroom: {name:'Bathroom',    fill:'#FEE2E2',stroke:'#DC2626',wRange:[80,120], hRange:[100,140]},
    kitchen:  {name:'Kitchen',     fill:'#FEF9C3',stroke:'#CA8A04',wRange:[160,220],hRange:[140,200]},

function snapCandidates(excl){
  const pts=[];
  for(const s of S.shapes){
    if(s.id===excl)continue;
    if(s.type==='rect'&&!s.poly){
      const{x,y,w,h}=s;
      pts.push({x,y,t:'endpoint'},{x:x+w,y,t:'endpoint'},{x,y:y+h,t:'endpoint'},{x:x+w,y:y+h,t:'endpoint'});
      pts.push({x:x+w/2,y,t:'midpoint'},{x:x+w/2,y:y+h,t:'midpoint'},{x,y:y+h/2,t:'midpoint'},{x:x+w,y:y+h/2,t:'midpoint'});
      pts.push({x:x+w/2,y:y+h/2,t:'center'});
    }
  }
  return pts;
}
function smartSnap(wx,wy,excl=null){
  if(!S.snapOn)return{x:wx,y:wy,t:'grid'};   // snap removed → free, un-snapped placement
  const th=SNAP_THRESH/S.zoom;
  let best=null,bd=th;
  for(const p of snapCandidates(excl)){const d=Math.hypot(p.x-wx,p.y-wy);if(d<bd){bd=d;best=p;}}
  return best||{x:gSnapX(wx),y:gSnapY(wy),t:'grid'};
}
function showSnap(pt){
  lSnap.innerHTML='';if(!pt)return;
  // Grid snaps don't get a marker — that yellow crosshair followed the cursor everywhere.
  // Only the meaningful snaps (endpoint / midpoint / center) show an indicator.
  if(pt.t==='grid')return;
  const sp=w2s(pt.x,pt.y),c=SNAP_COLORS[pt.t]||SNAP_COLORS.grid,r=13;
  lSnap.appendChild(ns('line',{x1:sp.x-r,y1:sp.y,x2:sp.x+r,y2:sp.y,stroke:c,'stroke-width':1,'stroke-dasharray':'3 2',opacity:.8}));
  lSnap.appendChild(ns('line',{x1:sp.x,y1:sp.y-r,x2:sp.x,y2:sp.y+r,stroke:c,'stroke-width':1,'stroke-dasharray':'3 2',opacity:.8}));
  if(pt.t==='endpoint')lSnap.appendChild(ns('rect',{x:sp.x-4,y:sp.y-4,width:8,height:8,fill:'none',stroke:c,'stroke-width':1.5,rx:1}));
  else if(pt.t==='midpoint'){const t=4;lSnap.appendChild(ns('polygon',{points:`${sp.x},${sp.y-t} ${sp.x+t},${sp.y+t} ${sp.x-t},${sp.y+t}`,fill:'none',stroke:c,'stroke-width':1.5}));}
  else if(pt.t==='center')lSnap.appendChild(ns('circle',{cx:sp.x,cy:sp.y,r:4.5,fill:'none',stroke:c,'stroke-width':1.5}));
  else lSnap.appendChild(ns('circle',{cx:sp.x,cy:sp.y,r:3,fill:'none',stroke:c,'stroke-width':1.5}));
}

function mkRect(x,y,w,h,opts={}){

function mkLine(pts){return{id:S.nextId++,type:'line',pts,stroke:'#94A3B8',strokeW:1.5,opacity:1,_new:Date.now()}}
function getS(id){return S.shapes.find(s=>s.id===id)}
function updS(id,p){const i=S.shapes.findIndex(s=>s.id===id);if(i>=0)S.shapes[i]={...S.shapes[i],...p}}
function delS(id){S.shapes=S.shapes.filter(s=>s.id!==id)}
function bounds(s){
  if(s.type==='rect'){
    if(s.poly){let x=Infinity,y=Infinity,r=-Infinity,b=-Infinity;for(const p of s.poly){x=Math.min(x,p.x);y=Math.min(y,p.y);r=Math.max(r,p.x);b=Math.max(b,p.y);}return{x,y,r,b};}
    return{x:s.x,y:s.y,r:s.x+s.w,b:s.y+s.h};
  }
  if(s.type==='line'){let x=Infinity,y=Infinity,r=-Infinity,b=-Infinity;for(const p of s.pts){x=Math.min(x,p.x);y=Math.min(y,p.y);r=Math.max(r,p.x);b=Math.max(b,p.y);}return{x,y,r,b};}
}
function rectToPoly(s){return[{x:s.x,y:s.y},{x:s.x+s.w,y:s.y},{x:s.x+s.w,y:s.y+s.h},{x:s.x,y:s.y+s.h}];}
function selBounds(){
  if(!S.selIds.size)return null;
  let x=Infinity,y=Infinity,r=-Infinity,b=-Infinity;
  for(const id of S.selIds){const s=getS(id);if(!s)continue;const bb=bounds(s);x=Math.min(x,bb.x);y=Math.min(y,bb.y);r=Math.max(r,bb.r);b=Math.max(b,bb.b);}
  return{x,y,r,b,w:r-x,h:b-y};
}
function distSeg(px,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;
  if(!l2)return Math.hypot(px-x1,py-y1);
  const t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/l2));
  return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));
}
function pointInPoly(px,py,pts){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y;
    if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}
// A label anchor that is guaranteed to sit INSIDE the (possibly L-shaped) polygon.
// Uses the true area-weighted centroid; if that falls in a concavity (outside the
// shape), scans the bounding box for the interior point closest to it.
function polyLabelPoint(poly){
  let a=0,cx=0,cy=0;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const f=poly[j].x*poly[i].y-poly[i].x*poly[j].y;
    a+=f;cx+=(poly[j].x+poly[i].x)*f;cy+=(poly[j].y+poly[i].y)*f;
  }
  if(Math.abs(a)<1e-6){
    const mx=poly.reduce((s,p)=>s+p.x,0)/poly.length,my=poly.reduce((s,p)=>s+p.y,0)/poly.length;
    return{x:mx,y:my};
  }
  a*=0.5;cx/=(6*a);cy/=(6*a);
  if(pointInPoly(cx,cy,poly))return{x:cx,y:cy};
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const p of poly){minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);}
  const step=Math.max((maxX-minX)/24,(maxY-minY)/24,1);
  let best=null,bd=Infinity;
  for(let y=minY+step/2;y<maxY;y+=step)for(let x=minX+step/2;x<maxX;x+=step){
    if(pointInPoly(x,y,poly)){const d=Math.hypot(x-cx,y-cy);if(d<bd){bd=d;best={x,y};}}
  }
  return best||{x:cx,y:cy};
}
function hitTest(wx,wy){
  const th=Math.max(5,7/S.zoom);
  for(let i=S.shapes.length-1;i>=0;i--){
    const s=S.shapes[i];
    if(s.type==='rect'){
      if(s.poly){if(pointInPoly(wx,wy,s.poly))return s.id;}
      else{if(wx>=s.x&&wx<=s.x+s.w&&wy>=s.y&&wy<=s.y+s.h)return s.id;}
    }else if(s.type==='line'){
      for(let j=0;j<s.pts.length-1;j++){if(distSeg(wx,wy,s.pts[j].x,s.pts[j].y,s.pts[j+1].x,s.pts[j+1].y)<th)return s.id;}
    }
  }
  return null;
}

// ─────────────────────────────────────────
//  PREDICTION
// ─────────────────────────────────────────
// Bounding box (x,y,w,h) of a rect — plain OR merged polygon — so prediction keeps
// working after rooms are merged into an irregular shape.
function rectBox(s){
  if(s.poly){let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    for(const p of s.poly){minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);}
    return{x:minX,y:minY,w:maxX-minX,h:maxY-minY};}
  return{x:s.x,y:s.y,w:s.w,h:s.h};
}
function getTypedRooms(){return S.shapes.filter(s=>s.type==='rect'&&s.roomType).map(s=>({type:s.roomType,...rectBox(s),id:s.id}));}
function overlapCheck(rx,ry,rw,rh,margin=2){
  return S.shapes.some(s=>{if(s.type!=='rect')return false;const b=rectBox(s);
    return rx<b.x+b.w-margin&&rx+rw>b.x+margin&&ry<b.y+b.h-margin&&ry+rh>b.y+margin;});
}
function sharedEdge(ax,ay,aw,ah,bx,by,bw,bh){
  const ox=Math.min(ax+aw,bx+bw)-Math.max(ax,bx),oy=Math.min(ay+ah,by+bh)-Math.max(ay,by);
  if(ox>0&&oy<=2)return ox;if(oy>0&&ox<=2)return oy;return 0;
}
// How fully the two rooms share a wall: shared length / shorter touching side (0..1).
// A long shared wall = a genuinely good adjacency; a tiny touch = a weak placement.
function sharedFit(ax,ay,aw,ah,bx,by,bw,bh){

function doZoom(f,csx,csy){

function hexToRgba(hex,a){

}

  hot.appendChild(bg);
  const t=ns('text',{x:mid,y:midy,'text-anchor':'middle','dominant-baseline':'middle',fill:c,'font-size':fs,'font-family':"'SF Mono','Fira Code','Menlo',monospace",'font-weight':'600',class:'dim-lbl','data-sid':sid,'data-dim':dim});
  t.textContent=label;hot.appendChild(t);
  attachHint(hot,'Edit size','type a number');
  g.appendChild(hot);
}
function renderDims(s){
  const g=ns('g'),inv=1/S.zoom,off=48*inv,ext=9*inv,sw=inv,C='#E05C2B';
  if(s.type==='rect'&&!s.poly){
    // Plain rectangle — width dim above, height dim to the right (offset clear of the border)
    const bx=s.x,by=s.y,bw=s.w,bh=s.h;
    const wy=by-off;
    g.appendChild(ns('line',{x1:bx,y1:by-ext*.3,x2:bx,y2:wy-ext*.3,stroke:C,'stroke-width':sw}));
    g.appendChild(ns('line',{x1:bx+bw,y1:by-ext*.3,x2:bx+bw,y2:wy-ext*.3,stroke:C,'stroke-width':sw}));
    dimLine(g,bx,wy,bx+bw,wy,dimStr(bw),C,s.id,'w');
    const hx=bx+bw+off;
    g.appendChild(ns('line',{x1:bx+bw+ext*.3,y1:by,x2:hx+ext*.3,y2:by,stroke:C,'stroke-width':sw}));
    g.appendChild(ns('line',{x1:bx+bw+ext*.3,y1:by+bh,x2:hx+ext*.3,y2:by+bh,stroke:C,'stroke-width':sw}));
    dimLine(g,hx,by,hx,by+bh,dimStr(bh),C,s.id,'h');
  }else if(s.type==='rect'&&s.poly){
    // Merged/irregular shape — overall bounding-box dims (width above, height right),
    // plus each wall segment labelled closer to the outline.
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    for(const p of s.poly){minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);}
    const bx=minX,by=minY,bw=maxX-minX,bh=maxY-minY,wy=by-off;
    g.appendChild(ns('line',{x1:bx,y1:by-ext*.3,x2:bx,y2:wy-ext*.3,stroke:C,'stroke-width':sw}));
    g.appendChild(ns('line',{x1:bx+bw,y1:by-ext*.3,x2:bx+bw,y2:wy-ext*.3,stroke:C,'stroke-width':sw}));
    dimLine(g,bx,wy,bx+bw,wy,dimStr(bw),C,s.id,'w');
    const hx=bx+bw+off;
    g.appendChild(ns('line',{x1:bx+bw+ext*.3,y1:by,x2:hx+ext*.3,y2:by,stroke:C,'stroke-width':sw}));
    g.appendChild(ns('line',{x1:bx+bw+ext*.3,y1:by+bh,x2:hx+ext*.3,y2:by+bh,stroke:C,'stroke-width':sw}));
    dimLine(g,hx,by,hx,by+bh,dimStr(bh),C,s.id,'h');
    const n=s.poly.length,fs=9.5/S.zoom;
    for(let i=0;i<n;i++){
      const a=s.poly[i],b=s.poly[(i+1)%n];
      const len=Math.round(Math.hypot(b.x-a.x,b.y-a.y));if(len<1)continue;
      const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
      // outward normal for this axis-aligned edge (flip if it points into the shape)
      let nrx=(a.x===b.x)?1:0,nry=(a.x===b.x)?0:1;
      if(pointInPoly(mx+nrx*4,my+nry*4,s.poly)){nrx=-nrx;nry=-nry;}
      const d=22*inv,px=mx+nrx*d,py=my+nry*d,lbl=dimStr(len),tw=(lbl.length)*fs*.62;
      // small tick from the wall out toward the label
      g.appendChild(ns('line',{x1:mx+nrx*6*inv,y1:my+nry*6*inv,x2:mx+nrx*(d-fs*.75),y2:my+nry*(d-fs*.75),stroke:C,'stroke-width':sw,opacity:.5}));
      g.appendChild(ns('rect',{x:px-tw/2-2*inv,y:py-fs/2-2*inv,width:tw+4*inv,height:fs+4*inv,fill:'white',rx:2*inv}));
      const t=ns('text',{x:px,y:py,'text-anchor':'middle','dominant-baseline':'middle',fill:C,'font-size':fs,'font-family':"'SF Mono','Fira Code','Menlo',monospace",'font-weight':'600',style:'pointer-events:none'});
      t.textContent=lbl;g.appendChild(t);
    }
  }else if(s.type==='line'&&s.pts.length>=2){
    for(let i=0;i<s.pts.length-1;i++){
      const a=s.pts[i],b=s.pts[i+1];
      const len=Math.round(Math.hypot(b.x-a.x,b.y-a.y));
      const ang=Math.atan2(b.y-a.y,b.x-a.x),perp=ang-Math.PI/2;
      const mx=(a.x+b.x)/2,my=(a.y+b.y)/2,d=12/S.zoom;
      const px=mx+d*Math.cos(perp),py=my+d*Math.sin(perp);
      const fs=10/S.zoom,tw=(len+'').length*fs*.62;
      g.appendChild(ns('rect',{x:px-tw/2-2*inv,y:py-fs/2-2*inv,width:tw+4*inv,height:fs+4*inv,fill:'white',rx:2*inv}));
      const t=ns('text',{x:px,y:py,'text-anchor':'middle','dominant-baseline':'middle',fill:C,'font-size':fs,'font-family':"'SF Mono','Fira Code','Menlo',monospace",'font-weight':'600'});
      t.textContent=dimStr(len);g.appendChild(t);
    }
  }
  return g;
}

// a rotation handle: sits ABOVE the top-centre "+" duplicate button so they don't overlap
function rotHandleEl(sid,minX,minY,maxX,maxY,inv){
  const g=ns('g'),cx=(minX+maxX)/2,r=6*inv,hy=minY-46*inv;     // clear the "+" (at −22, top ≈ −34)
  g.appendChild(ns('line',{x1:cx,y1:minY-34*inv,x2:cx,y2:hy,stroke:C_SEL,'stroke-width':1.2*inv,'pointer-events':'none'}));
  const h=ns('circle',{cx:cx,cy:hy,r:r,fill:'white',stroke:C_SEL,'stroke-width':1.5*inv,
    class:'rot-handle','data-sid':sid,style:'cursor:grab'});
  attachHint(h,'Rotate','⇧ snap 15°');
  g.appendChild(h);
  return g;
}
function renderHandles(s){
  if(s.type==='line'){
    const g=ns('g'),inv=1/S.zoom,hs=5.5*inv;
    s.pts.forEach((p,i)=>{
      const pEl=ns('rect',{x:p.x-hs,y:p.y-hs,width:hs*2,height:hs*2,
        fill:'white',stroke:C_SEL,'stroke-width':1.4*inv,rx:1.5*inv,
        class:'handle','data-hid':'pt'+i,'data-sid':s.id,style:'cursor:move'});
      attachHint(pEl,'Move point');
      g.appendChild(pEl);
    });
    return g;
  }
  if(s.type!=='rect')return ns('g');
  const g=ns('g'),inv=1/S.zoom,hs=5.5*inv;

  if(s.poly){
    // Merged/irregular shape — same editing model as a rectangle, on its bounding box
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    for(const p of s.poly){minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);}
    const bw=maxX-minX,bh=maxY-minY;
    // Edge hit-zones — drag a wall to move it (appended first so corners/vertices stay on top)
    const np=s.poly.length;
    for(let i=0;i<np;i++){
      const a=s.poly[i],b=s.poly[(i+1)%np];
      const horiz=(a.y===b.y),vert=(a.x===b.x);
      if(!horiz&&!vert)continue; // axis-aligned walls only
      const len=Math.hypot(b.x-a.x,b.y-a.y);if(len<GRID)continue;
      const ux=(b.x-a.x)/len,uy=(b.y-a.y)/len,ein=Math.min(14*inv,len/3);
      const eEl=ns('line',{x1:a.x+ux*ein,y1:a.y+uy*ein,x2:b.x-ux*ein,y2:b.y-uy*ein,
        stroke:'#000','stroke-opacity':'0','stroke-width':12*inv,'pointer-events':'all',
        class:'handle poly-edge','data-sid':s.id,'data-hid':'pe'+i,
        style:`cursor:${horiz?'ns-resize':'ew-resize'}`});
      attachHint(eEl,'Drag to resize side');
      g.appendChild(eEl);
    }
    // Per-vertex reshape circles (skip ones sitting on a bbox corner — those are scale handles)
    s.poly.forEach((p,i)=>{
      const atCorner=(p.x===minX||p.x===maxX)&&(p.y===minY||p.y===maxY);
      if(atCorner)return;
      const vEl=ns('circle',{cx:p.x,cy:p.y,r:hs*1.2,
        fill:'white',stroke:C_SEL,'stroke-width':1.5*inv,
        class:'handle','data-hid':'p'+i,'data-sid':s.id,style:'cursor:move'});
      attachHint(vEl,'Reshape','drag vertex');
      g.appendChild(vEl);
    });
    // Bounding-box corner scale handles
    const bcorners=[
      {id:'bnw',x:minX,y:minY,cur:'nwse-resize'},{id:'bne',x:maxX,y:minY,cur:'nesw-resize'},
      {id:'bse',x:maxX,y:maxY,cur:'nwse-resize'},{id:'bsw',x:minX,y:maxY,cur:'nesw-resize'},
    ];
    for(const c of bcorners){
      const hEl=ns('rect',{x:c.x-hs,y:c.y-hs,width:hs*2,height:hs*2,
        fill:'white',stroke:'#8CA3C5','stroke-width':1.4*inv,rx:1.5*inv,
        class:'handle','data-hid':c.id,'data-sid':s.id,style:`cursor:${c.cur}`});
      attachHint(hEl,'Scale','⇧ proportional');
      g.appendChild(hEl);
    }
    // "+" duplicate buttons on all 4 edges
    const pr=12*inv,off=22*inv,mX=(minX+maxX)/2,mY=(minY+maxY)/2;
    const dirs=[
      {bx:maxX+off,by:mY,dx:bw+GRID,dy:0},{bx:minX-off,by:mY,dx:-(bw+GRID),dy:0},
      {bx:mX,by:minY-off,dx:0,dy:-(bh+GRID)},{bx:mX,by:maxY+off,dx:0,dy:bh+GRID},
    ];
    for(const d of dirs){
      const pg=ns('g',{class:'plus-dup','data-sid':s.id,style:'cursor:pointer'});
      const pc=ns('circle',{cx:d.bx,cy:d.by,r:pr,fill:'white',stroke:'#D4D4D0','stroke-width':1.2*inv});
      const pt=ns('text',{x:d.bx,y:d.by,'text-anchor':'middle','dominant-baseline':'middle',fill:'#9CA3AF','font-size':15*inv,'font-weight':'300','font-family':'system-ui',style:'pointer-events:none'});
      pt.textContent='+';pg.appendChild(pc);pg.appendChild(pt);
      attachHint(pg,'Duplicate','copy shape here');
      pg.addEventListener('mouseenter',()=>{pc.setAttribute('stroke',C_SEL);pc.setAttribute('fill','#EFF6FF');pt.setAttribute('fill',C_SEL);});
      pg.addEventListener('mouseleave',()=>{pc.setAttribute('stroke','#D4D4D0');pc.setAttribute('fill','white');pt.setAttribute('fill','#9CA3AF');});
      pg.addEventListener('click',ev=>{ev.stopPropagation();const src=getS(s.id);if(!src||!src.poly)return;
        const nc=JSON.parse(JSON.stringify(src));nc.id=S.nextId++;nc._new=Date.now();
        nc.poly=src.poly.map(p=>({x:p.x+d.dx,y:p.y+d.dy}));
        S.shapes.push(nc);S.selIds=new Set([nc.id]);saveH();if(S.sceneKey)S.candidates=predictNextRooms();render();});
      g.appendChild(pg);
    }
    g.appendChild(rotHandleEl(s.id,minX,minY,maxX,maxY,inv));
    return g;
  }

  // ── Corner handles (4) — drag = scale the whole rect; Alt-drag = free-reshape one corner ──
  const corners=[
    {id:'nw',x:s.x,y:s.y,cur:'nwse-resize'},
    {id:'ne',x:s.x+s.w,y:s.y,cur:'nesw-resize'},
    {id:'se',x:s.x+s.w,y:s.y+s.h,cur:'nwse-resize'},
    {id:'sw',x:s.x,y:s.y+s.h,cur:'nesw-resize'}
  ];
  for(const p of corners){
    const hEl=ns('rect',{x:p.x-hs,y:p.y-hs,width:hs*2,height:hs*2,
      fill:'white',stroke:'#8CA3C5','stroke-width':1.4*inv,rx:1.5*inv,
      class:'handle','data-hid':p.id,'data-sid':s.id,style:`cursor:${p.cur}`});
    attachHint(hEl,'Scale','⌥ drag to reshape');
    g.appendChild(hEl);
  }

  // ── Wall edge hit zones (inset from corners so corners stay free for scaling) ──
  const wallEdges=[
    {side:'n',x1:s.x,y1:s.y,x2:s.x+s.w,y2:s.y},
    {side:'s',x1:s.x,y1:s.y+s.h,x2:s.x+s.w,y2:s.y+s.h},
    {side:'e',x1:s.x+s.w,y1:s.y,x2:s.x+s.w,y2:s.y+s.h},
    {side:'w',x1:s.x,y1:s.y,x2:s.x,y2:s.y+s.h},
  ];
  for(const e of wallEdges){
    const horiz=e.y1===e.y2,len=horiz?Math.abs(e.x2-e.x1):Math.abs(e.y2-e.y1);
    const ins=Math.min(14*inv,len/3);
    const x1=horiz?e.x1+ins:e.x1,x2=horiz?e.x2-ins:e.x2;
    const y1=horiz?e.y1:e.y1+ins,y2=horiz?e.y2:e.y2-ins;
    // Invisible hit zone — stroke-opacity:0 + pointer-events:all is reliable in SVG
    const wEl=ns('line',{x1,y1,x2,y2,
      stroke:'#000','stroke-opacity':'0','stroke-width':12*inv,'pointer-events':'all',
      class:'wall-edge','data-sid':s.id,'data-side':e.side,style:`cursor:${horiz?'ns-resize':'ew-resize'}`});
    attachHint(wEl,'Drag to resize','click: wall type');
    g.appendChild(wEl);
  }

  // ── "+" duplicate buttons hugging all 4 edges (dimensions sit further out) ──
  const pr=12*inv,off=22*inv;
  const midX=s.x+s.w/2,midY=s.y+s.h/2;
  const edgeDirs=[
    {bx:s.x+s.w+off,by:midY,        newPos:src=>({x:src.x+src.w,y:src.y})},
    {bx:s.x-off,    by:midY,        newPos:src=>({x:src.x-src.w,y:src.y})},
    {bx:midX,       by:s.y-off,     newPos:src=>({x:src.x,      y:src.y-src.h})},
    {bx:midX,       by:s.y+s.h+off, newPos:src=>({x:src.x,      y:src.y+src.h})},
  ];
  for(const dir of edgeDirs){
    const pg=ns('g',{class:'plus-dup','data-sid':s.id,style:'cursor:pointer'});
    const pc=ns('circle',{cx:dir.bx,cy:dir.by,r:pr,fill:'white',stroke:'#D4D4D0','stroke-width':1.2*inv});
    const pt=ns('text',{x:dir.bx,y:dir.by,'text-anchor':'middle','dominant-baseline':'middle',
      fill:'#9CA3AF','font-size':15*inv,'font-weight':'300','font-family':'system-ui',style:'pointer-events:none'});
    pt.textContent='+';
    pg.appendChild(pc);pg.appendChild(pt);
    attachHint(pg,'Duplicate','copy room here');
    pg.addEventListener('mouseenter',()=>{pc.setAttribute('stroke',C_SEL);pc.setAttribute('fill','#EFF6FF');pt.setAttribute('fill',C_SEL);});
    pg.addEventListener('mouseleave',()=>{pc.setAttribute('stroke','#D4D4D0');pc.setAttribute('fill','white');pt.setAttribute('fill','#9CA3AF');});
    pg.addEventListener('click',ev=>{
      ev.stopPropagation();
      const src=getS(s.id);if(!src||src.type!=='rect')return;
      const nc=JSON.parse(JSON.stringify(src));
      const pos=dir.newPos(src);
      nc.id=S.nextId++;nc.x=pos.x;nc.y=pos.y;nc._new=Date.now();
      delete nc.poly;
      S.shapes.push(nc);S.selIds=new Set([nc.id]);
      saveH();if(S.sceneKey)S.candidates=predictNextRooms();
      render();
    });
    g.appendChild(pg);
  }

  g.appendChild(rotHandleEl(s.id,s.x,s.y,s.x+s.w,s.y+s.h,inv));
  return g;
}
function renderMultiBounds(){

function renderPredictionCircles(s,parent){
  const sc=getScene();
  if(!sc||!S.candidates.length)return;
  const inv=1/S.zoom;
  const r=26*inv;
  // Position: to the right of the "+" duplicate button
  const baseX=s.x+s.w+(22+32+20)*inv;
  const baseY=s.y+s.h/2;
  const spacing=64*inv;
  const count=S.candidates.length;
  S.candidates.forEach((c,i)=>{
    const def=sc.types[c.type];if(!def)return;
    const cy=baseY+(i-(count-1)/2)*spacing;
    const grp=ns('g',{class:'pred-circ','data-cand':i,style:'cursor:pointer'});
    grp.classList.add('pred-spring');
    // Only set animation-delay via style on the group
    grp.style.animationDelay=(i*55)+'ms';
    // Connector line from "+" to first circle
    if(i===0){
      const connX=s.x+s.w+(22+32)*inv;
      parent.appendChild(ns('line',{x1:connX,y1:baseY,x2:baseX-r,y2:baseY,
        stroke:'#E2E8F0','stroke-width':.8*inv,'stroke-dasharray':`${3*inv} ${2*inv}`}));
    }
    // Vertical line between circles
    if(i>0){
      const prevY=baseY+(i-1-(count-1)/2)*spacing;
      parent.appendChild(ns('line',{x1:baseX,y1:prevY+r,x2:baseX,y2:cy-r,
        stroke:'#E2E8F0','stroke-width':.7*inv}));
    }
    const isHov=S.hovCand===i;
    // Shadow/glow when hovered
    if(isHov){
      grp.appendChild(ns('circle',{cx:baseX,cy,r:r+5*inv,fill:def.stroke,opacity:'.15'}));
    }
    // Main circle
    grp.appendChild(ns('circle',{cx:baseX,cy,r,fill:def.stroke,stroke:'white','stroke-width':2.5*inv,opacity:isHov?1:.85}));
    // "+" symbol
    const tp=ns('text',{x:baseX,y:cy-r*.22,'text-anchor':'middle','dominant-baseline':'middle',fill:'white','font-size':17*inv,'font-weight':'200','font-family':'system-ui',style:'pointer-events:none'});
    tp.textContent='+';grp.appendChild(tp);
    // Short name
    const name=def.name.replace(' Room','').replace(' Hall','').replace(' Store','').replace(' Office','');
    const words=name.split(' ');
    const line1=words[0]||'';
    const line2=words.slice(1).join(' ')||'';
    const fn=ns('text',{x:baseX,y:cy+r*.32+(line2?-r*.13:0),'text-anchor':'middle','dominant-baseline':'middle',fill:'white','font-size':8.5*inv,'font-weight':'700','font-family':'-apple-system,sans-serif',style:'pointer-events:none'});
    fn.textContent=line1;grp.appendChild(fn);
    if(line2){
      const fn2=ns('text',{x:baseX,y:cy+r*.32+r*.26,'text-anchor':'middle','dominant-baseline':'middle',fill:'white','font-size':8.5*inv,'font-weight':'700','font-family':'-apple-system,sans-serif',style:'pointer-events:none'});
      fn2.textContent=line2;grp.appendChild(fn2);
    }
    // Confidence arc (tiny ring)
    if(c.confidence&&r*S.zoom>20){
      const arc=ns('circle',{cx:baseX,cy,r:r-3*inv,fill:'none',stroke:'rgba(255,255,255,.25)','stroke-width':2*inv,'stroke-dasharray':`${(c.confidence/100)*(2*Math.PI*(r-3*inv))} 9999`,'stroke-dashoffset':'0','stroke-linecap':'round',transform:`rotate(-90 ${baseX} ${cy})`});
      grp.appendChild(arc);
    }
    grp.addEventListener('mouseenter',()=>{S.hovCand=i;renderCandidatesLayer();});
    grp.addEventListener('mouseleave',()=>{S.hovCand=null;renderCandidatesLayer();});
    grp.addEventListener('click',ev=>{ev.stopPropagation();acceptCandidate(i);});
    parent.appendChild(grp);
  });
}

// ─────────────────────────────────────────
//  CANDIDATES LAYER (canvas overlay)
// ─────────────────────────────────────────
function renderCandidatesLayer(){
  lCands.innerHTML='';if(!S.candidates.length||S.predHidden)return;
  const sc=getScene();
  S.candidates.forEach((c,i)=>{
    const color=CAND_COLORS[i],inv=1/S.zoom,isHov=S.hovCand===i;
    const g=ns('g',{class:'cand-g','data-cand':i,style:'cursor:pointer'});
    if(isHov)g.appendChild(ns('rect',{x:c.x-5*inv,y:c.y-5*inv,width:c.w+10*inv,height:c.h+10*inv,fill:'none',stroke:color,'stroke-width':4*inv,rx:3*inv,opacity:.18}));
    g.appendChild(ns('rect',{x:c.x,y:c.y,width:c.w,height:c.h,fill:color+'12',stroke:color,'stroke-width':(isHov?2.5:1.5)*inv,'stroke-dasharray':`${7*inv} ${4*inv}`,rx:2*inv,class:'cand-dash'}));
    // Room name + confidence (number and a bar) in the center of the predicted rectangle
    const def=sc?sc.types[c.type]:null;
    const conf=c.confidence||0;
    if(def&&c.w*S.zoom>50&&c.h*S.zoom>28){
      const fs=Math.max(8,Math.min(12,c.w/11))*inv;
      const cx=c.x+c.w/2,cyc=c.y+c.h/2;
      const showConf=conf>0&&c.h*S.zoom>52;
      const t=ns('text',{x:cx,y:showConf?cyc-fs*.58:cyc,'text-anchor':'middle','dominant-baseline':'middle',fill:color,'font-size':fs,'font-weight':'600','letter-spacing':1*inv,'font-family':"'SF Mono','Menlo',monospace",style:'pointer-events:none'});
      t.textContent=def.name.toUpperCase();g.appendChild(t);
      if(showConf){
        const pt=ns('text',{x:cx,y:cyc+fs*.42,'text-anchor':'middle','dominant-baseline':'middle',fill:color,'font-size':fs*.82,'font-weight':'700','font-family':"'SF Mono','Menlo',monospace",style:'pointer-events:none'});
        pt.textContent=conf+'%';g.appendChild(pt);
        // confidence bar: faint full track + solid fill proportional to the %
        const barW=Math.min(c.w*.6,84*inv),barH=4*inv,barX=cx-barW/2,barY=cyc+fs*1.02;
        g.appendChild(ns('rect',{x:barX,y:barY,width:barW,height:barH,rx:barH/2,fill:color,opacity:.16,style:'pointer-events:none'}));
        g.appendChild(ns('rect',{x:barX,y:barY,width:barW*Math.min(1,conf/100),height:barH,rx:barH/2,fill:color,style:'pointer-events:none'}));
      }
    }
    g.addEventListener('click',()=>acceptCandidate(i));
    lCands.appendChild(g);
  });
}

let discOpen=false;
function openRadialDisc(sx,sy){
  const sc=getScene();
  S.predHidden=false; // re-opening the predictor brings the ghosts back
  const margin=170,cx=Math.max(margin,Math.min(cW()-margin,sx)),cy=Math.max(margin,Math.min(cH()-margin,sy));
  discEl.style.left=cx+'px';discEl.style.top=cy+'px';
  let items=[];
  if(!sc){
    items=[
      {label:'Apartment',color:'#2563EB',fill:'#DBEAFE',conf:null,action:()=>startScene('apartment')},
      {label:'Healthcare',color:'#16A34A',fill:'#DCFCE7',conf:null,action:()=>startScene('healthcare')},
      {label:'Mall',     color:'#CA8A04',fill:'#FEF9C3',conf:null,action:()=>startScene('mall')},
    ];
    document.getElementById('rd-center').textContent='Scene';
    document.getElementById('rd-center').style.fontSize='9px';
  }else{
    const cands=predictNextRooms();S.candidates=cands;
    if(!cands.length){items=[{label:'No suggestions',color:'#9CA3AF',fill:'#F3F4F6',conf:0,action:()=>{}}];}
    else{items=cands.map((c,i)=>({label:sc.types[c.type].name,color:CAND_COLORS[i],fill:sc.types[c.type].fill,conf:c.confidence,action:()=>acceptCandidate(i),idx:i,cand:c}));}
    document.getElementById('rd-center').textContent=sc.name.slice(0,3).toUpperCase();
    document.getElementById('rd-center').style.fontSize='8px';
  }
  discEl.querySelectorAll('.rd-item').forEach(el=>el.remove());
  const count=items.length,r=count<=2?108:128;
  items.forEach((item,i)=>{
    const angle=-Math.PI/2+(i/count)*2*Math.PI;
    const ix=Math.cos(angle)*r,iy=Math.sin(angle)*r;
    const wrap=document.createElement('div');wrap.className='rd-item';
    const pct=item.conf!==null&&item.conf!==undefined?item.conf+'%':'';
    const ttl=item.cand?' title="Middle-click for the % breakdown"':'';
    wrap.innerHTML=`<div class="rd-bubble" data-idx="${i}"${ttl}>
      <div class="rb-dot" style="background:${item.color}"></div>
      <div class="rb-name">${item.label}</div>
      ${pct?`<div class="rb-pct" style="color:${item.color}">${pct}</div>`:''}</div>`;
    const bubble=wrap.querySelector('.rd-bubble');
    bubble.addEventListener('click',e=>{e.stopPropagation();closeRadialDisc();setTimeout(()=>item.action(),80);});
    if(item.idx!=null){
      bubble.addEventListener('mouseenter',()=>{S.hovCand=item.idx;renderCandidatesLayer();});
      bubble.addEventListener('mouseleave',()=>{S.hovCand=null;renderCandidatesLayer();});
    }
    // Middle-click a program → toggle the "why this %" breakdown next to it
    if(item.cand){
      bubble.addEventListener('mousedown',e=>{if(e.button===1){e.stopPropagation();e.preventDefault();togglePredDetail(item,bubble);}});
      bubble.addEventListener('auxclick',e=>{if(e.button===1){e.stopPropagation();e.preventDefault();}});
    }
    wrap.style.position='absolute';wrap.style.top='0';wrap.style.left='0';
    wrap.style.opacity='0';wrap.style.transform='translate(-50%,-50%) scale(0.2)';
    discEl.appendChild(wrap);
    const delay=i*50;
    setTimeout(()=>{
      wrap.style.transition=`transform .44s cubic-bezier(.34,1.62,.5,1) ${delay}ms,opacity .24s ease ${delay}ms`;
      wrap.style.opacity='1';wrap.style.transform=`translate(calc(${ix}px - 50%),calc(${iy}px - 50%))`;
    },10);
  });
  discEl.style.display='block';discBackdrop.style.display='block';discOpen=true;render();
}
function closeRadialDisc(){
  if(!discOpen)return;
  hidePredDetail();
  discEl.querySelectorAll('.rd-item').forEach((w,i)=>{
    w.style.transition=`transform .22s ease,opacity .18s ease ${i*15}ms`;
    w.style.opacity='0';w.style.transform='translate(-50%,-50%) scale(0.2)';
  });
  setTimeout(()=>{discEl.style.display='none';discEl.querySelectorAll('.rd-item').forEach(e=>e.remove());discBackdrop.style.display='none';},240);
  S.hovCand=null;renderCandidatesLayer();discOpen=false;
}

let predDetailIdx=null;
function hidePredDetail(){const pd=document.getElementById('pred-detail');pd.style.display='none';predDetailIdx=null;}
function togglePredDetail(item,bubbleEl){
  const pd=document.getElementById('pred-detail');
  if(predDetailIdx===item.idx){hidePredDetail();return;}
  const c=item.cand,d=c.detail,col=item.color;
  const sizeTxt=dimStr(d.w)+' × '+dimStr(d.h);
  const areaTxt=S.sqft?(d.w*FT_SCALE*d.h*FT_SCALE).toFixed(0)+' sq ft':Math.round(d.w*d.h/1000)+'k px²';
  pd.innerHTML=
    `<div class="pd-h"><span>${item.label}</span><span class="pd-big" style="color:${col}">${c.confidence}%</span></div>`+
    `<div class="pd-row"><div class="pd-lbl"><span>Type fit</span><span>${d.typeConf}%</span></div>`+
      `<div class="pd-track"><div class="pd-fill" style="width:${d.typeConf}%;background:${col}"></div></div></div>`+
    `<div class="pd-row"><div class="pd-lbl"><span>Wall fit</span><span>${d.wallFit}%</span></div>`+
      `<div class="pd-track"><div class="pd-fill" style="width:${d.wallFit}%;background:${col}"></div></div></div>`+
    `<div class="pd-note">Size ${sizeTxt} · ${areaTxt}${d.neighbor?` · ${c.reasoning}`:''}`+
      `<br>% = type fit × (0.6 + 0.4 × wall fit)</div>`;
  pd.style.display='block';
  const wr=cwrap.getBoundingClientRect(),br=bubbleEl.getBoundingClientRect();
  let left=br.right-wr.left+8,top=br.top-wr.top-4;
  const pw=pd.offsetWidth,ph=pd.offsetHeight;
  if(left+pw>cW()-6)left=br.left-wr.left-pw-8; // flip to the left if it would overflow
  if(left<6)left=6;

  pd.style.left=left+'px';pd.style.top=top+'px';
  predDetailIdx=item.idx;
}

// ─────────────────────────────────────────
//  ARCHITECTURAL MODE — walls + doors come from the backend (/api/arch).
//  The frontend stays a pure renderer: it ships the layout, draws the result.
// ─────────────────────────────────────────
function scheduleArch(){ // debounced refresh; coalesces rapid edits into one request
  if(!S.archOn)return;
  clearTimeout(S._archT);
  S._archT=setTimeout(fetchArch,70);
}
async function fetchArch(){
  if(!S.archOn)return;
  try{
    const res=await fetch('/api/arch',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({shapes:S.shapes,sceneKey:S.sceneKey})});
    const data=await res.json();S.archRuns=data.runs||[];S.archErr=false;
  }catch(e){S.archRuns=[];S.archErr=true;}
  if(S.archOn)document.getElementById('s-tool').textContent=S.archErr?'Plan — start the server: node server.js':'Plan (walls + doors)';
  renderArch();
  if(typeof EXPLAIN!=='undefined')EXPLAIN.refresh();
}
function renderArch(){
  lArch.innerHTML='';if(!S.archOn)return;
  const inv=1/S.zoom,COL='#2B2B2B';
  for(const r of S.archRuns){
    const len=r.len||1,ux=(r.bx-r.ax)/len,uy=(r.by-r.ay)/len,t=r.t||6,ex=t/2;
    const seg=(t0,t1)=>{
      const ax=r.ax+ux*t0,ay=r.ay+uy*t0,bx=r.ax+ux*t1,by=r.ay+uy*t1,nx=-uy*t/2,ny=ux*t/2;
      lArch.appendChild(ns('polygon',{points:`${ax+nx},${ay+ny} ${bx+nx},${by+ny} ${bx-nx},${by-ny} ${ax-nx},${ay-ny}`,fill:COL}));
    };
    if(r.door){
      const[c0,c1]=r.door,dw=c1-c0;
      seg(-ex,c0);seg(c1,len+ex); // extend the corner ends (not the door jambs) so right-angle joins fill
      const hx=r.ax+ux*c0,hy=r.ay+uy*c0;                 // hinge
      const tipx=hx+r.nx*dw,tipy=hy+r.ny*dw;
      lArch.appendChild(ns('line',{x1:hx,y1:hy,x2:tipx,y2:tipy,stroke:COL,'stroke-width':1.4*inv})); // door leaf
      let a0=Math.atan2(r.ny,r.nx),a1=Math.atan2(uy,ux),da=a1-a0;
      while(da>Math.PI)da-=2*Math.PI;while(da<-Math.PI)da+=2*Math.PI;
      const pts=[];for(let k=0;k<=10;k++){const ang=a0+da*k/10;pts.push((hx+Math.cos(ang)*dw)+','+(hy+Math.sin(ang)*dw));}
      lArch.appendChild(ns('polyline',{points:pts.join(' '),fill:'none',stroke:COL,'stroke-width':inv,'stroke-dasharray':`${3*inv} ${2.5*inv}`,opacity:.6}));
    }else seg(-ex,len+ex);
  }
}

function transformSel(fn){
  const bb=selBounds();if(!bb)return;
  const cx=(bb.x+bb.r)/2,cy=(bb.y+bb.b)/2;
  const boxFromPts=pts=>{let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    for(const p of pts){minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);}
    return{minX,minY,maxX,maxY};};
  for(const id of S.selIds){const s=getS(id);if(!s)continue;
    if(s.type==='rect'&&!s.poly){
      const pts=rectToPoly(s).map(p=>fn(p.x,p.y,cx,cy));const bx=boxFromPts(pts);
      updS(id,{x:gSnapX(bx.minX),y:gSnapY(bx.minY),w:bx.maxX-bx.minX,h:bx.maxY-bx.minY});
    }else if(s.poly){updS(id,{poly:s.poly.map(p=>{const r=fn(p.x,p.y,cx,cy);return{x:gSnapX(r.x),y:gSnapY(r.y)};})});}
    else if(s.type==='line'){updS(id,{pts:s.pts.map(p=>{const r=fn(p.x,p.y,cx,cy);return{x:gSnapX(r.x),y:gSnapY(r.y)};})});}
  }
  saveH();if(S.sceneKey)S.candidates=predictNextRooms();render();
}
function rotateSel(dir){ // 90°; dir=1 clockwise, -1 counter-clockwise
  transformSel((x,y,cx,cy)=>dir>0?{x:cx-(y-cy),y:cy+(x-cx)}:{x:cx+(y-cy),y:cy-(x-cx)});
}
function mirrorSel(axis){ // 'h' = flip left↔right, 'v' = flip top↔bottom
  transformSel((x,y,cx,cy)=>axis==='h'?{x:2*cx-x,y}:{x,y:2*cy-y});
}

// ─────────────────────────────────────────
//  JOIN — merge selected rects into one united shape (union outline)
// ─────────────────────────────────────────
function shapesUnionLoops(shapes){
  // Works for any axis-aligned shapes (plain rects AND already-merged polygons)
  const polys=shapes.map(s=>s.poly?s.poly:rectToPoly(s));
  const xs=new Set(),ys=new Set();
  for(const poly of polys)for(const p of poly){xs.add(p.x);ys.add(p.y);}
  const X=[...xs].sort((a,b)=>a-b),Y=[...ys].sort((a,b)=>a-b);
  const nx=X.length-1,ny=Y.length-1;
  const filled=[];
  for(let i=0;i<nx;i++){filled[i]=[];for(let j=0;j<ny;j++){
    const cx=(X[i]+X[i+1])/2,cy=(Y[j]+Y[j+1])/2;
    filled[i][j]=polys.some(poly=>pointInPoly(cx,cy,poly));
  }}
  const F=(i,j)=>i>=0&&i<nx&&j>=0&&j<ny&&filled[i][j];
  // Directed boundary edges (filled cell kept on the right while walking)
  const edges=[];
  for(let i=0;i<nx;i++)for(let j=0;j<ny;j++){
    if(!filled[i][j])continue;
    if(!F(i-1,j))edges.push({x1:X[i],y1:Y[j+1],x2:X[i],y2:Y[j]});       // left   → up
    if(!F(i+1,j))edges.push({x1:X[i+1],y1:Y[j],x2:X[i+1],y2:Y[j+1]});   // right  → down
    if(!F(i,j-1))edges.push({x1:X[i],y1:Y[j],x2:X[i+1],y2:Y[j]});       // top    → right
    if(!F(i,j+1))edges.push({x1:X[i+1],y1:Y[j+1],x2:X[i],y2:Y[j+1]});   // bottom → left
  }
  const key=(x,y)=>x+','+y,startMap=new Map();
  for(const e of edges){const k=key(e.x1,e.y1);if(!startMap.has(k))startMap.set(k,[]);startMap.get(k).push(e);}
  const used=new Set(),loops=[];
  for(const e0 of edges){
    if(used.has(e0))continue;
    const loop=[];let cur=e0;
    while(cur&&!used.has(cur)){
      used.add(cur);loop.push({x:cur.x1,y:cur.y1});
      const cand=(startMap.get(key(cur.x2,cur.y2))||[]).filter(x=>!used.has(x));
      cur=cand[0];
    }
    if(loop.length>=4)loops.push(simplifyColinear(loop));
  }
  return loops;
}
function simplifyColinear(pts){
  const out=[],n=pts.length;
  for(let i=0;i<n;i++){
    const a=pts[(i-1+n)%n],b=pts[i],c=pts[(i+1)%n];
    const col=(a.x===b.x&&b.x===c.x)||(a.y===b.y&&b.y===c.y);
    if(!col)out.push(b);
  }
  return out;
}
function polyAreaAbs(pts){let a=0;for(let i=0,j=pts.length-1;i<pts.length;j=i++)a+=(pts[j].x+pts[i].x)*(pts[j].y-pts[i].y);return Math.abs(a/2);}
// True if a shape is axis-aligned (plain rect, or a polygon whose every edge is H or V).
function isAxisAligned(s){
  if(!s.poly)return true;
  for(let i=0;i<s.poly.length;i++){const a=s.poly[i],b=s.poly[(i+1)%s.poly.length];
    if(Math.abs(a.x-b.x)>1e-6&&Math.abs(a.y-b.y)>1e-6)return false;}
  return true;
}
// ── General polygon union (preserves diagonal / irregular edges) ──
// Used when merging shapes that aren't all axis-aligned, so slanted walls survive.
function simplifyColinearG(pts){
  const out=[],n=pts.length;
  for(let i=0;i<n;i++){
    const a=pts[(i-1+n)%n],b=pts[i],c=pts[(i+1)%n];
    const cross=(b.x-a.x)*(c.y-a.y)-(b.y-a.y)*(c.x-a.x);
    if(Math.abs(cross)>1e-6)out.push(b);
  }
  return out;
}
function segSegOnAB(a,b,c,d){ // params t∈[0,1] on AB where AB meets CD (incl. collinear overlap)
  const EPS=1e-7,rx=b.x-a.x,ry=b.y-a.y,sx=d.x-c.x,sy=d.y-c.y,rxs=rx*sy-ry*sx;
  const qpx=c.x-a.x,qpy=c.y-a.y,out=[];
  if(Math.abs(rxs)<1e-12){
    if(Math.abs(qpx*ry-qpy*rx)<1e-9){const rr=rx*rx+ry*ry;
      for(const p of[c,d]){const t=((p.x-a.x)*rx+(p.y-a.y)*ry)/rr;if(t>EPS&&t<1-EPS)out.push(t);}}
    return out;
  }
  const t=(qpx*sy-qpy*sx)/rxs,u=(qpx*ry-qpy*rx)/rxs;
  if(t>=-EPS&&t<=1+EPS&&u>=-EPS&&u<=1+EPS)out.push(Math.max(0,Math.min(1,t)));
  return out;
}
function generalUnionLoops(shapes){
  const EPS=1e-7;
  const polys=shapes.map(s=>s.poly?s.poly.map(p=>({x:p.x,y:p.y})):rectToPoly(s));
  const segs=[];
  for(const poly of polys)for(let i=0;i<poly.length;i++){const a=poly[i],b=poly[(i+1)%poly.length];if(Math.hypot(b.x-a.x,b.y-a.y)>EPS)segs.push([a,b]);}
  // split every segment at intersections / T-junctions with all others
  const split=[];
  for(const seg of segs){
    const[a,b]=seg,rx=b.x-a.x,ry=b.y-a.y;let ts=[0,1];
    for(const o of segs){if(o===seg)continue;for(const t of segSegOnAB(a,b,o[0],o[1]))ts.push(t);}
    ts.sort((u,v)=>u-v);const uniq=[];for(const t of ts){if(!uniq.length||t-uniq[uniq.length-1]>1e-6)uniq.push(t);}
    for(let i=0;i<uniq.length-1;i++){const t0=uniq[i],t1=uniq[i+1];split.push([{x:a.x+rx*t0,y:a.y+ry*t0},{x:a.x+rx*t1,y:a.y+ry*t1}]);}
  }
  // keep subsegments on the union boundary (inside on one side, outside on the other); orient interior-left
  const insideCount=pt=>{let c=0;for(const poly of polys)if(pointInPoly(pt.x,pt.y,poly))c++;return c;};
  const kept=[];
  for(const[a,b]of split){
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2,dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy);if(len<EPS)continue;
    const nx=-dy/len,ny=dx/len,off=Math.min(0.1,len/4);
    const insL=insideCount({x:mx+nx*off,y:my+ny*off})>0,insR=insideCount({x:mx-nx*off,y:my-ny*off})>0;
    if(insL!==insR)kept.push(insL?[a,b]:[b,a]);
  }
  // stitch directed edges into loops (at a junction take the most-clockwise turn)
  const rnd=v=>Math.round(v/1e-4)*1e-4,key=p=>rnd(p.x)+','+rnd(p.y);
  const outMap=new Map();
  for(const e of kept){const k=key(e[0]);if(!outMap.has(k))outMap.set(k,[]);outMap.get(k).push(e);}
  const used=new Set(),loops=[];
  for(const start of kept){
    if(used.has(start))continue;
    const loop=[];let cur=start,g=0;
    while(cur&&!used.has(cur)&&g++<100000){
      used.add(cur);loop.push({x:cur[0].x,y:cur[0].y});
      const pool=(outMap.get(key(cur[1]))||[]).filter(e=>!used.has(e));
      if(!pool.length){cur=null;break;}
      const inAng=Math.atan2(cur[1].y-cur[0].y,cur[1].x-cur[0].x);
      let best=null,bestT=Infinity;
      for(const e of pool){let turn=Math.atan2(e[1].y-e[0].y,e[1].x-e[0].x)-inAng;
        while(turn<=-Math.PI)turn+=2*Math.PI;while(turn>Math.PI)turn-=2*Math.PI;
        if(turn<bestT){bestT=turn;best=e;}}
      cur=best;
    }
    if(loop.length>=3)loops.push(simplifyColinearG(loop));
  }
  return loops;
}
function joinSelected(){
  // Accept rects AND already-merged polys so shapes can be merged repeatedly
  const sel=[...S.selIds].map(getS).filter(s=>s&&s.type==='rect');
  if(sel.length<2)return;
  // Axis-aligned merges use the robust rasterized union; if any shape is irregular
  // (slanted edges), use the general union so the diagonal walls are preserved.
  const unionFn=sel.every(isAxisAligned)?shapesUnionLoops:generalUnionLoops;
  const loops=unionFn(sel).filter(l=>polyAreaAbs(l)>1).sort((a,b)=>polyAreaAbs(b)-polyAreaAbs(a));
  if(!loops.length)return;
  const base=sel[0],ids=new Set(S.selIds);
  S.shapes=S.shapes.filter(s=>!ids.has(s.id));
  const newIds=[];
  for(const loop of loops){
    const m=mkRect(0,0,1,1,{fill:base.fill,stroke:base.stroke,roomType:base.roomType});
    // If the union is a plain rectangle, store it as one (full rectangle functions);
    // otherwise keep it as an editable polygon.
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    for(const p of loop){minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);}
    // Collapse to a plain rect ONLY when the loop is a true axis-aligned rectangle —
    // a 4-point slanted quad must stay a polygon so its diagonal edges survive.
    const axisRect=loop.length===4&&loop.every((p,i)=>{const q=loop[(i+1)%4];return Math.abs(p.x-q.x)<1e-6||Math.abs(p.y-q.y)<1e-6;});
    if(axisRect){m.x=minX;m.y=minY;m.w=maxX-minX;m.h=maxY-minY;}
    else m.poly=loop.map(p=>({x:p.x,y:p.y}));
    if(base.name)m.name=base.name;
    S.shapes.push(m);newIds.push(m.id);
  }
  S.selIds=new Set(newIds);
  saveH();if(S.sceneKey)S.candidates=predictNextRooms();render();
}

// ─────────────────────────────────────────
//  RESIZE / DEFORM
// ─────────────────────────────────────────
function applyResize(wp){
  const o=S.resShape0,h=S.resHandle;
  // ── Polygon edge drag (move a whole wall perpendicular; keeps the shape rectilinear) ──
  if(o.type==='rect'&&o.poly&&typeof h==='string'&&h.startsWith('pe')){
    const idx=parseInt(h.slice(2)),n=o.poly.length;
    const a=o.poly[idx],b=o.poly[(idx+1)%n],sn=smartSnap(wp.x,wp.y,o.id);
    const poly=o.poly.map(p=>({...p}));
    if(a.y===b.y){const ny=gSnapY(sn.y);poly[idx].y=ny;poly[(idx+1)%n].y=ny;}
    else{const nx=gSnapX(sn.x);poly[idx].x=nx;poly[(idx+1)%n].x=nx;}
    updS(o.id,{poly});showSnap(sn);return;
  }
  // ── Polygon vertex drag (reshape one vertex) ──
  if(o.type==='rect'&&o.poly&&h[0]==='p'){
    const idx=parseInt(h.slice(1));const sn=smartSnap(wp.x,wp.y,o.id);
    const poly=o.poly.map(p=>({...p}));poly[idx]={x:sn.x,y:sn.y};
    updS(o.id,{poly});showSnap(sn);return;
  }
  // ── Polygon bbox scale (drag whole shape; ⇧ = proportional) ──
  if(o.type==='rect'&&o.poly&&h[0]==='b'){
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    for(const p of o.poly){minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);}
    const w0=(maxX-minX)||1,h0=(maxY-minY)||1;
    const ax=(h==='bne'||h==='bse')?minX:maxX, ay=(h==='bse'||h==='bsw')?minY:maxY; // anchor = opposite corner
    const sn=smartSnap(wp.x,wp.y,o.id);
    let sx=Math.max(GRID/w0,Math.abs(sn.x-ax)/w0), sy=Math.max(GRID/h0,Math.abs(sn.y-ay)/h0);
    if(S.shiftScale){const k=Math.max(sx,sy);sx=k;sy=k;}
    const poly=o.poly.map(p=>({x:gSnapX(ax+(p.x-ax)*sx),y:gSnapY(ay+(p.y-ay)*sy)}));
    updS(o.id,{poly});showSnap(sn);return;
  }
  // ── Rect edge drag (drag a border line to resize just that side) ──
  if(o.type==='rect'&&!o.poly&&['en','es','ee','ew'].includes(h)){
    const sn=smartSnap(wp.x,wp.y,o.id);
    if(h==='en'){const bottom=o.y+o.h,ny=Math.min(sn.y,bottom-GRID);updS(o.id,{y:ny,h:bottom-ny});}
    else if(h==='es'){updS(o.id,{h:Math.max(GRID,sn.y-o.y)});}
    else if(h==='ew'){const right=o.x+o.w,nx=Math.min(sn.x,right-GRID);updS(o.id,{x:nx,w:right-nx});}
    else if(h==='ee'){updS(o.id,{w:Math.max(GRID,sn.x-o.x)});}
    showSnap(sn);return;
  }
  // ── Rect corner drag ──
  if(o.type==='rect'&&['nw','ne','se','sw'].includes(h)){
    const idx={nw:0,ne:1,se:2,sw:3}[h];
    const sn=smartSnap(wp.x,wp.y,o.id);
    // Alt-drag → convert to polygon and move just this corner
    if(S.deformDrag){
      const basePoly=rectToPoly(o);
      basePoly[idx]={x:sn.x,y:sn.y};
      updS(o.id,{poly:basePoly});showSnap(sn);return;
    }
    // Default → scale the rect; opposite corner stays anchored. ⇧ = lock aspect ratio
    const anchorX=(h==='nw'||h==='sw')?o.x+o.w:o.x;
    const anchorY=(h==='nw'||h==='ne')?o.y+o.h:o.y;
    const dirX=(h==='ne'||h==='se')?1:-1, dirY=(h==='se'||h==='sw')?1:-1;
    let nw=Math.max(GRID,Math.abs(sn.x-anchorX)), nh=Math.max(GRID,Math.abs(sn.y-anchorY));
    if(S.shiftScale){const aspect=o.w/o.h||1; if(nw/nh>aspect)nh=nw/aspect; else nw=nh*aspect;}
    const nx=dirX>0?anchorX:anchorX-nw, ny=dirY>0?anchorY:anchorY-nh;
    updS(o.id,{x:nx,y:ny,w:nw,h:nh});showSnap(sn);return;
  }
  // ── Line point drag ──
  if(o.type==='line'){
    const idx=parseInt(h.replace('pt',''));
    if(!isNaN(idx)){const sn=smartSnap(wp.x,wp.y,o.id);const pts=[...o.pts];pts[idx]={x:sn.x,y:sn.y};updS(o.id,{pts});showSnap(sn);}
  }
}

function onDown(e){
  hideCtx();
  // Middle-click → radial "adjacent room" picker
  if(e.button===1){const sp=evtSP(e);if(discOpen)closeRadialDisc();else openRadialDisc(sp.x,sp.y);e.preventDefault();return;}
  if(discOpen&&!discEl.contains(e.target)&&e.target!==discBackdrop)closeRadialDisc();
  if(e.button===0&&S.spaceDown){S.panning=true;S.panSP=evtSP(e);S.panView0={x:S.vx,y:S.vy};updateCursor();e.preventDefault();return;}
  if(e.button!==0)return;
  // Let the "+" duplicate buttons and candidate ghosts handle their own click
  if(e.target.closest('.plus-dup')||e.target.closest('.cand-g'))return;
  const wp=evtWP(e),sp=evtSP(e);
  if(S.tool==='pan'){S.panning=true;S.panSP=sp;S.panView0={x:S.vx,y:S.vy};updateCursor();return;}
  if(S.tool==='line'){
    const sn=smartSnap(wp.x,wp.y);showSnap(sn);
    if(!S.lineDrawing){S.lineDrawing=true;S.linePts=[{x:sn.x,y:sn.y}];}else S.linePts.push({x:sn.x,y:sn.y});
    e.preventDefault();return;
  }
  if(S.tool==='rect'){
    // Rotation handle → free-rotate the shape about its centre
    const rEl=e.target.closest('.rot-handle');
    if(rEl){
      const rsid=parseInt(rEl.dataset.sid),rs=getS(rsid);if(!rs)return;
      if(!S.selIds.has(rsid)){S.selIds=new Set([rsid]);render();}
      const poly0=rs.poly?rs.poly.map(p=>({x:p.x,y:p.y})):rectToPoly(rs);
      let mnx=Infinity,mny=Infinity,mxx=-Infinity,mxy=-Infinity;
      for(const p of poly0){mnx=Math.min(mnx,p.x);mny=Math.min(mny,p.y);mxx=Math.max(mxx,p.x);mxy=Math.max(mxy,p.y);}
      S.rotating=true;S.rotSid=rsid;S.rotPoly0=poly0;
      S.rotCenter={x:(mnx+mxx)/2,y:(mny+mxy)/2};
      S.rotStart=Math.atan2(wp.y-S.rotCenter.y,wp.x-S.rotCenter.x);
      e.preventDefault();return;
    }
    // Resize / vertex handle (checked before edges so corners win when overlapping)
    const hEl=e.target.closest('.handle');
    if(hEl){
      const hsid=parseInt(hEl.dataset.sid),hhid=hEl.dataset.hid;
      const hs=getS(hsid);if(!hs)return;
      if(!S.selIds.has(hsid)){S.selIds=new Set([hsid]);render();}
      S.resizing=true;S.resHandle=hhid;
      S.deformDrag=e.altKey&&['nw','ne','se','sw'].includes(hhid);
      S.resShape0=JSON.parse(JSON.stringify(hs));
      S.resWP=wp;e.preventDefault();return;
    }
    // Wall edge → drag resizes that side; a click (no drag) opens the wall-type menu
    const wEl=e.target.closest('.wall-edge');
    if(wEl){
      const wsid=parseInt(wEl.dataset.sid),wside=wEl.dataset.side;
      const ws=getS(wsid);if(!ws)return;
      if(!S.selIds.has(wsid)){S.selIds=new Set([wsid]);render();}
      S.resizing=true;S.resHandle='e'+wside;
      S.resShape0=JSON.parse(JSON.stringify(getS(wsid)));S.resWP=wp;
      S.edgeClick={sid:wsid,side:wside,sx:sp.x,sy:sp.y,moved:false};
      e.preventDefault();return;
    }
    // Dim text click — preventDefault so the input keeps focus (otherwise it blurs instantly)
    const dt=e.target.closest('.dim-hot');
    if(dt){e.preventDefault();const t=dt.querySelector('.dim-lbl');if(t)startDimEdit(t,e);return;}
    // Existing shape → select + drag
    const shEl=e.target.closest('[data-sid]');
    let sid=shEl?parseInt(shEl.dataset.sid):null;if(!sid)sid=hitTest(wp.x,wp.y);
    if(sid){
      if(e.shiftKey){if(S.selIds.has(sid))S.selIds.delete(sid);else S.selIds.add(sid);render();}
      else{if(!S.selIds.has(sid)){S.selIds=new Set([sid]);render();}
        S.dragging=true;S.dragWP=wp;
        S.dragShapes0=new Map([...S.selIds].map(id=>{const s=getS(id);return[id,JSON.parse(JSON.stringify(s))]}));}
      e.preventDefault();return;
    }
    // Empty space → Shift: marquee-select the swept region; otherwise draw a new rect
    if(e.shiftKey){
      S.selBoxing=true;S.sbSP0=sp;S.sbSP1=sp;e.preventDefault();return;
    }
    S.selIds=new Set();
    const sn=smartSnap(wp.x,wp.y);showSnap(sn);S.drawing=true;S.drawP0=sn;
    e.preventDefault();return;
  }
}
function onMove(e){
  const sp=evtSP(e),wp=s2w(sp.x,sp.y);S.curWP=wp;
  document.getElementById('s-coords').textContent=(S.sqft?pxToFt(wp.x)+', '+pxToFt(wp.y)+' ft':Math.round(wp.x)+', '+Math.round(wp.y));
  if(S.panning){S.vx=S.panView0.x+(sp.x-S.panSP.x);S.vy=S.panView0.y+(sp.y-S.panSP.y);applyView();return;}
  if(S.rotating){
    const c=S.rotCenter;let ang=Math.atan2(wp.y-c.y,wp.x-c.x)-S.rotStart;
    if(e.shiftKey)ang=Math.round(ang/(Math.PI/12))*(Math.PI/12); // ⇧ → 15° steps
    const cos=Math.cos(ang),sin=Math.sin(ang);
    const poly=S.rotPoly0.map(p=>{const dx=p.x-c.x,dy=p.y-c.y;return{x:c.x+dx*cos-dy*sin,y:c.y+dx*sin+dy*cos};});
    updS(S.rotSid,{poly});
    let deg=Math.round(ang*180/Math.PI)%360;if(deg<0)deg+=360;
    document.getElementById('s-tool').textContent='Rotate '+deg+'°';
    render();return;
  }
  if(S.drawing&&S.tool==='rect'){const sn=smartSnap(wp.x,wp.y);showSnap(sn);renderPreview(S.drawP0,sn);drawRulers();return;}
  if(S.lineDrawing){const sn=smartSnap(wp.x,wp.y);showSnap(sn);renderLinePreview(S.linePts,sn);drawRulers();return;}
  if(S.dragging){
    const dx=wp.x-S.dragWP.x,dy=wp.y-S.dragWP.y;
    for(const[id,o]of S.dragShapes0){
      if(o.type==='rect'){
        if(o.poly)updS(id,{poly:o.poly.map(p=>({x:gSnapX(p.x+dx),y:gSnapY(p.y+dy)}))});
        else updS(id,{x:gSnapX(o.x+dx),y:gSnapY(o.y+dy)});
      }else if(o.type==='line')updS(id,{pts:o.pts.map(p=>({x:gSnapX(p.x+dx),y:gSnapY(p.y+dy)}))});
    }
    render();return;
  }
  if(S.resizing){
    S.shiftScale=e.shiftKey;
    // Edge interaction: wait until the pointer actually moves before treating it as a resize
    if(S.edgeClick&&!S.edgeClick.moved){
      if(Math.hypot(sp.x-S.edgeClick.sx,sp.y-S.edgeClick.sy)<4){drawRulers();return;}
      S.edgeClick.moved=true;
    }
    applyResize(wp);
    const rs=getS(S.resShape0.id),h=S.resHandle;
    if(rs){
      let txt,sub;
      if(rs.poly&&h&&h[0]==='p'){txt='Reshape';sub='vertex';}
      else if(rs.poly){const bb=bounds(rs);txt=dimStr(bb.r-bb.x)+' × '+dimStr(bb.b-bb.y);sub=S.shiftScale?'proportional':'scale';}
      else if(S.deformDrag){txt='Reshape';sub='corner';}
      else{txt=dimStr(rs.w)+' × '+dimStr(rs.h);sub=S.shiftScale?'proportional':'scale';}
      showHint(txt,sp.x,sp.y,sub);
    }
    render();return;
  }
  if(S.selBoxing){S.sbSP1=sp;renderSelBox(S.sbSP0,S.sbSP1);}
  if(S.tool==='rect'||S.tool==='select'){const hov=hitTest(wp.x,wp.y);if(hov!==S.hovId){S.hovId=hov;render();}}
  if(S.tool==='rect'||S.tool==='line')showSnap(smartSnap(wp.x,wp.y));else lSnap.innerHTML='';
  drawRulers();
}
function onUp(e){
  if(S.panning){S.panning=false;updateCursor();return;}
  if(S.rotating){
    S.rotating=false;S.rotSid=null;S.rotPoly0=null;S.rotCenter=null;
    document.getElementById('s-tool').textContent='Rectangle';
    saveH();if(S.sceneKey)S.candidates=predictNextRooms();render();return;
  }
  if(S.drawing&&S.tool==='rect'){
    const wp=evtWP(e),sn=smartSnap(wp.x,wp.y);
    const rx=Math.min(S.drawP0.x,sn.x),ry=Math.min(S.drawP0.y,sn.y);
    const rw=Math.abs(sn.x-S.drawP0.x),rh=Math.abs(sn.y-S.drawP0.y);
    if(rw>4&&rh>4){const s=mkRect(rx,ry,rw,rh);S.shapes.push(s);S.selIds=new Set([s.id]);saveH();render();}
    S.drawing=false;lPreview.innerHTML='';lSnap.innerHTML='';return;
  }
  if(S.dragging){S.dragging=false;hideHint();saveH();if(S.sceneKey)S.candidates=predictNextRooms();render();return;}
  if(S.resizing){
    const ec=S.edgeClick;
    S.resizing=false;S.resHandle=null;S.deformDrag=false;S.shiftScale=false;S.edgeClick=null;hideHint();
    if(ec&&!ec.moved){ // edge was clicked, not dragged → wall-type menu
      render();openWallMenu(ec.sid,ec.side,ec.sx,ec.sy);return;
    }
    saveH();if(S.sceneKey)S.candidates=predictNextRooms();render();return;
  }
  if(S.selBoxing){
    S.selBoxing=false;lSelBox.innerHTML='';
    const wp0=s2w(Math.min(S.sbSP0.x,S.sbSP1.x),Math.min(S.sbSP0.y,S.sbSP1.y));
    const wp1=s2w(Math.max(S.sbSP0.x,S.sbSP1.x),Math.max(S.sbSP0.y,S.sbSP1.y));
    const ns2=new Set();
    // Sweep-select: any shape the marquee touches (intersection), added to the current selection
    for(const s of S.shapes){const bb=bounds(s);if(bb.x<wp1.x&&bb.r>wp0.x&&bb.y<wp1.y&&bb.b>wp0.y)ns2.add(s.id);}
    for(const id of ns2)S.selIds.add(id);
    render();
  }
}

window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key===' '){S.spaceDown=true;updateCursor();e.preventDefault();return;}
  if(e.key==='v'||e.key==='V')setTool('rect');
  if(e.key==='r'||e.key==='R')setTool('rect');
  if(e.key==='l'||e.key==='L')setTool('line');
  if(e.key==='h'||e.key==='H')setTool('pan');
  if(e.key==='f'||e.key==='F')fitScreen();
  if(e.key==='g'||e.key==='G')toggleGrid();
  if(e.key==='b'||e.key==='B')toggleArch();
  if(e.key==='t'||e.key==='T')toggleSqft();
  if(e.key==='x'||e.key==='X')EXPLAIN.toggle();
  if(e.key==='e'||e.key==='E'){
    if(discOpen)closeRadialDisc();
    else{let sx=cW()/2,sy=cH()/2;if(S.selIds.size){const bb=selBounds();if(bb){const sp=w2s((bb.x+bb.r)/2,(bb.y+bb.b)/2);sx=sp.x;sy=sp.y;}}openRadialDisc(sx,sy);}
    e.preventDefault();
  }
  if(e.key==='='||e.key==='+')doZoom(1.2);
  if(e.key==='-')doZoom(.83);
  if(e.key==='a'&&(e.metaKey||e.ctrlKey)){S.selIds=new Set(S.shapes.map(s=>s.id));render();e.preventDefault();}
  if((e.key==='Delete'||e.key==='Backspace')&&S.selIds.size){
    for(const id of S.selIds)delS(id);S.selIds=new Set();saveH();if(S.sceneKey)S.candidates=predictNextRooms();render();
  }
  if(e.key==='Escape'){
    S.predHidden=true; // exit the dashed prediction state
    if(discOpen){closeRadialDisc();}
    else{S.lineDrawing=false;S.linePts=[];lPreview.innerHTML='';lSnap.innerHTML='';
      S.selIds=new Set();S.drawing=false;S.deformDrag=false;render();}
  }
  if(e.key==='Enter'&&S.lineDrawing&&S.linePts.length>=2){
    const s=mkLine([...S.linePts]);S.shapes.push(s);S.selIds=new Set([s.id]);
    S.lineDrawing=false;S.linePts=[];lPreview.innerHTML='';saveH();render();
  }
  else if(e.key==='Enter'&&!S.lineDrawing&&S.selIds.size>=2){
    joinSelected();e.preventDefault();
  }
  if((e.metaKey||e.ctrlKey)&&e.key==='z'){e.shiftKey?redo():undo();e.preventDefault();}
  if((e.metaKey||e.ctrlKey)&&e.key==='c'){copySel();e.preventDefault();}
  if((e.metaKey||e.ctrlKey)&&e.key==='v'){pasteSel();e.preventDefault();}
  if((e.metaKey||e.ctrlKey)&&e.key==='d'){copySel();pasteSel();e.preventDefault();}
  if(S.selIds.size&&['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
    const d=e.shiftKey?10:1;
    for(const id of S.selIds){const s=getS(id);if(!s)continue;
      if(s.type==='rect'&&!s.poly)updS(id,{x:s.x+(e.key==='ArrowLeft'?-d:e.key==='ArrowRight'?d:0),y:s.y+(e.key==='ArrowUp'?-d:e.key==='ArrowDown'?d:0)});
      else if(s.type==='line')updS(id,{pts:s.pts.map(p=>({x:p.x+(e.key==='ArrowLeft'?-d:e.key==='ArrowRight'?d:0),y:p.y+(e.key==='ArrowUp'?-d:e.key==='ArrowDown'?d:0)}))});
    }
    render();e.preventDefault();
  }
  if(e.key==='1'&&S.candidates[0])acceptCandidate(0);
  if(e.key==='2'&&S.candidates[1])acceptCandidate(1);
  if(e.key==='3'&&S.candidates[2])acceptCandidate(2);
});

let dimEdit=null;
function startDimEdit(el,e){
  const sid=parseInt(el.dataset.sid),dim=el.dataset.dim;
  const s=getS(sid);if(!s)return;
  const bb=el.getBoundingClientRect(),wr=cwrap.getBoundingClientRect();
  dimOverlay.style.left=(bb.left-wr.left-4)+'px';dimOverlay.style.top=(bb.top-wr.top-3)+'px';
  dimOverlay.style.display='block';
  let cw=s.w,ch=s.h;
  if(s.poly){let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    for(const p of s.poly){minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);}
    cw=maxX-minX;ch=maxY-minY;}
  const cur=dim==='w'?cw:ch;
  dimInp.value=S.sqft?+(cur*FT_SCALE).toFixed(1):Math.round(cur);
  dimInp.focus();dimInp.select();dimEdit={sid,dim};
}
function commitDim(){
  if(!dimEdit)return;
  const v=parseFloat(dimInp.value);
  if(!isNaN(v)&&v>0){
    const{sid,dim}=dimEdit;const s=getS(sid);
    const pxv=S.sqft?Math.round(v/FT_SCALE/GRID)*GRID:Math.max(GRID,Math.round(v/GRID)*GRID||v);
    if(s&&s.poly){
      // Scale the polygon so its bounding-box dimension becomes pxv (anchored top-left)
      let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
      for(const p of s.poly){minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);}
      const sx=dim==='w'?pxv/((maxX-minX)||1):1, sy=dim==='h'?pxv/((maxY-minY)||1):1;
      updS(sid,{poly:s.poly.map(p=>({x:gSnapX(minX+(p.x-minX)*sx),y:gSnapY(minY+(p.y-minY)*sy)}))});
    }else if(dim==='w')updS(sid,{w:pxv});else updS(sid,{h:pxv});
    saveH();if(S.sceneKey)S.candidates=predictNextRooms();render();
  }
  dimOverlay.style.display='none';dimEdit=null;
}
dimInp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commitDim();}if(e.key==='Escape'){dimOverlay.style.display='none';dimEdit=null;}e.stopPropagation();});
dimInp.addEventListener('blur',commitDim);

let nameEdit=null;
function shapeCenterScreen(s){
  if(s.poly){const lp=polyLabelPoint(s.poly);return w2s(lp.x,lp.y);}
  return w2s(s.x+s.w/2,s.y+s.h/2);
}
function startNameEdit(sid){
  const s=getS(sid);if(!s||s.type!=='rect')return;
  const sc=getScene(),def=s.roomType&&sc?sc.types[s.roomType]:null;
  const sp=shapeCenterScreen(s);
  nameOverlay.style.left=(sp.x-75)+'px';nameOverlay.style.top=(sp.y-14)+'px';
  nameOverlay.style.display='block';
  nameInp.value=s.name||(def?def.name:'');
  nameInp.focus();nameInp.select();nameEdit={sid};
}
function commitName(){
  if(!nameEdit)return;
  const v=nameInp.value.trim();const{sid}=nameEdit;
  const sc=getScene();
  // If the typed name matches a scene room type, adopt that type AND its color.
  let matched=null;
  if(sc&&v)for(const[k,def]of Object.entries(sc.types)){if(def.name.toLowerCase()===v.toLowerCase()){matched={k,def};break;}}
  if(matched){updS(sid,{roomType:matched.k,fill:matched.def.fill,stroke:matched.def.stroke,name:null});}
  else updS(sid,{name:v||null});
  saveH();if(S.sceneKey)S.candidates=predictNextRooms();render();
  nameOverlay.style.display='none';nameEdit=null;
}
nameInp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commitName();}if(e.key==='Escape'){nameOverlay.style.display='none';nameEdit=null;}e.stopPropagation();});
nameInp.addEventListener('blur',commitName);

// ─────────────────────────────────────────
//  EXPLAIN / DEMO LAYER  (walks through dtd2's algorithm — live breakdown
//  of prediction and wall/door generation)
//  Pure frontend, zero-intrusion: reads existing state only, never alters drawing.
// ─────────────────────────────────────────
const EXPLAIN={
  open:false, demoOn:false, cfg:null, _abort:false,
  sleep(ms){return new Promise(r=>setTimeout(r,ms));},
  toggle(){
    this.open=!this.open;
    document.getElementById('explain').classList.toggle('open',this.open);
    document.getElementById('btn-explain').classList.toggle('on',this.open);
    if(this.open){this.fetchCfg();this.refresh();}
  },
  narrate(html){const n=document.getElementById('xp-narr');if(n)n.innerHTML=html;},
  async fetchCfg(){
    if(this.cfg)return;
    try{const r=await fetch('/api/config');this.cfg=await r.json();this.refresh();}catch(e){this.cfg=null;}
  },
  refresh(){ if(!this.open)return; this.renderPrediction(); this.renderArch(); },

  renderPrediction(){
    const host=document.getElementById('xp-pred'); if(!host)return;
    const sc=getScene();
    if(!sc){
      host.innerHTML=`<div class="xp-sec"><span class="n">1</span>Predict the next room</div>`+
        `<div class="xp-card"><div class="xp-p">No scene yet. Press <b>E</b> (or middle-click) to open the radial menu and pick Apartment / Healthcare / Mall — the algorithm then starts predicting the most likely next room.</div></div>`;
      return;
    }
    const tr=getTypedRooms();
    const cands=(S.candidates&&S.candidates.length)?S.candidates:predictNextRooms();
    let html=`<div class="xp-sec"><span class="n">1</span>Predict the next room</div>`;
    // existing rooms
    const cnt={}; tr.forEach(r=>cnt[r.type]=(cnt[r.type]||0)+1);
    html+=`<div class="xp-card"><div class="xp-p"><b>${sc.name}</b> · existing rooms</div>`;
    if(!tr.length)html+=`<div class="xp-muted" style="margin-top:5px">(no typed rooms yet — rename a room to a type so it feeds the prediction)</div>`;
    else{html+=`<div>`;
      for(const[t,c]of Object.entries(cnt)){const d=sc.types[t];
        html+=`<span class="xp-pill"><span class="dot" style="background:${d.stroke}"></span>${d.name}${c>1?' ×'+c:''}</span>`;}
      html+=`</div>`;}
    html+=`</div>`;
    // candidates
    if(!cands.length){html+=`<div class="xp-card"><div class="xp-muted">No suggestions (the rooms already cover this scene's main types).</div></div>`;}
    else{
      cands.slice(0,3).forEach((c,i)=>{
        const d=sc.types[c.type],det=c.detail||{},col=CAND_COLORS[i];
        const rows={}; tr.forEach(r=>{const w=(sc.adj[r.type]||{})[c.type]||0; if(w)rows[r.type]=(rows[r.type]||0)+w;});
        let adj=''; for(const[t,w]of Object.entries(rows)) adj+=`${sc.types[t].name} → +${w}\n`;
        const sum=Object.values(rows).reduce((a,b)=>a+b,0);
        html+=`<div class="xp-card">`+
          `<div class="xp-row"><span class="dot" style="width:9px;height:9px;border-radius:50%;background:${col}"></span>`+
            `<b style="flex:1">${d.name}</b><span class="v" style="color:${col};font-size:13px">${c.confidence}%</span></div>`+
          `<div class="xp-row"><span class="k">type fit</span><span class="bar"><i style="width:${det.typeConf||0}%;background:${col}"></i></span><span class="v">${det.typeConf||0}%</span></div>`+
          `<div class="xp-row"><span class="k">wall fit</span><span class="bar"><i style="width:${det.wallFit||0}%;background:${col}"></i></span><span class="v">${det.wallFit||0}%</span></div>`+
          (adj?`<div class="xp-mono">sum of adjacency weights = ${sum}\n${adj.trim()}</div>`:``)+
        `</div>`;
      });
      html+=`<div class="xp-card" style="background:var(--accent-lt);border-color:rgba(29,106,245,.25)">`+
        `<div class="xp-p" style="color:#1a3a6b"><b>How confidence is computed</b></div>`+
        `<div class="xp-p" style="color:#1a3a6b">① <b>type fit</b> — sum of adjacency weights between the candidate type and every existing room, normalized against the strongest suggestion (the more it "belongs here", the higher).</div>`+
        `<div class="xp-p" style="color:#1a3a6b">② <b>wall fit</b> — how fully the candidate's spot shares a wall with its neighbor (a snugger fit scores higher).</div>`+
        `<div class="xp-mono" style="background:#fff">confidence = type fit × (0.6 + 0.4 × wall fit)</div></div>`;
    }
    host.innerHTML=html;
  },

  renderArch(){
    const host=document.getElementById('xp-arch'); if(!host)return;
    const thr=(this.cfg&&this.cfg.doorThreshold!=null)?this.cfg.doorThreshold:'threshold';
    let html=`<div class="xp-sec"><span class="n">2</span>Generate walls + doors (arch.js backend)</div>`;
    if(!S.archOn){
      html+=`<div class="xp-card"><div class="xp-p">Press <b>B</b> or click <b>Plan</b> in the top bar to open plan mode. The frontend sends the room layout to the backend <span class="xp-mono" style="display:inline;padding:1px 5px">/api/arch</span>; <b>arch.js</b> computes the walls and doors and draws them back — the frontend just renders.</div></div>`;
      host.innerHTML=html;return;
    }
    if(S.archErr){
      html+=`<div class="xp-card"><div class="xp-p" style="color:#C0392B">Backend isn't running. Start it with <span class="xp-mono" style="display:inline;padding:1px 5px">node server.js</span>, then open Plan.</div></div>`;
      host.innerHTML=html;return;
    }
    const runs=S.archRuns||[];
    const ext=runs.filter(r=>r.kind==='ext').length, intc=runs.filter(r=>r.kind==='int').length, doors=runs.filter(r=>r.door).length;
    html+=`<div class="xp-stat">`+
      `<div class="b"><div class="num">${runs.length}</div><div class="lbl">wall runs</div></div>`+
      `<div class="b"><div class="num">${ext}/${intc}</div><div class="lbl">ext/int</div></div>`+
      `<div class="b"><div class="num">${doors}</div><div class="lbl">doors</div></div></div>`;
    const steps=[
      ['Split','Cut every room edge at all mutual intersections into minimal segments.'],
      ['Classify','For each segment, check both sides: one side has a room = exterior (ext); two different rooms = interior partition (int).'],
      ['Merge','Merge collinear segments of the same line and kind into the longest wall run.'],
      ['Open doors',`For each adjacent pair take the longest shared interior wall; adjacency ≥ ${thr} opens a door (also opens when types are unknown).`],
      ['Safety net','Connectivity net: union-find from the entrance; if any room is unreachable, add a door on the highest-scoring wall.'],
      ['Entrance','Open a main door on the longest exterior wall of the entrance room.'],
    ];
    html+=`<div class="xp-card">`;
    steps.forEach((s,i)=>{html+=`<div class="xp-step on"><span class="si">${i+1}</span><span class="sx"><b>${s[0]}</b> — ${s[1]}</span></div>`;});
    html+=`</div>`;
    host.innerHTML=html;
  },

  // generate one room of a given type via the predictor's placement engine
  // (same findPlacements + scoring as a real suggestion); returns its wall fit
  _genRoom(type){
    const sc=getScene(); if(!sc||!sc.types[type])return null;
    const {w,h}=typeRangeMid(type);
    let pl=findPlacements(w,h,type),fw=w,fh=h;
    if(!pl.length){pl=findPlacements(h,w,type);fw=h;fh=w;}
    if(!pl.length)return null;
    const best=pl[0],def=sc.types[type];
    S.shapes.push(mkRect(best.x,best.y,fw,fh,{fill:def.fill,stroke:def.stroke,roomType:type}));
    saveH(); S.predHidden=false; S.candidates=predictNextRooms(); fitScreen(); render();
    return {wallFit:Math.round(Math.min(1,best.placeQ||0)*100)};
  },

  // ── One-click demo: pick scene → GENERATE a program of rooms → walls ──
  async demo(){
    if(this.demoOn){this._abort=true;return;}
    this.demoOn=true; this._abort=false;
    const btn=document.getElementById('btn-xp-demo'); btn.textContent='■ Stop'; btn.classList.add('stop');
    if(!this.open)this.toggle();
    // reset the canvas
    if(S.archOn){S.archOn=false;document.getElementById('btn-plan').classList.remove('on');S.archRuns=[];}
    S.shapes=[];S.selIds=new Set();S.candidates=[];S.predHidden=false;S.sceneKey=null;
    saveH();render();
    const step=async(html,ms)=>{this.narrate(html);await this.sleep(ms);return !this._abort;};
    try{
      if(!await step('<b>Step 1</b> — Pick a scene. Each scene has an adjacency-weight table that defines which rooms belong next to each other.',1300))return;
      startScene('apartment');
      const sc=getScene();
      if(!await step('<b>Step 2</b> — Start from a <b>Living Room</b>. Every other room is <i>generated</i> by the predictor — it chooses where to place each one and how confident it is.',1700))return;
      // target program — every room here is generated, none pre-placed
      const program=['dining','kitchen','bedroom','bathroom','corridor'];
      for(const type of program){
        S.candidates=predictNextRooms();render();
        const name=sc.types[type].name;
        const cand=S.candidates.find(c=>c.type===type);
        if(cand){
          const det=cand.detail||{};
          if(!await step(`<b>Generating ${name}</b> — the predictor ranks it <b>${cand.confidence}%</b> (type fit ${det.typeConf||0}% × wall fit ${det.wallFit||0}%) and drops it on the best-fit wall.`,1800))return;
          acceptCandidate(S.candidates.indexOf(cand));
        }else{
          const d=this._genRoom(type);
          if(!await step(`<b>Generating ${name}</b> — not the top suggestion this round, but the model still places it on its best-fit wall${d?` (wall fit <b>${d.wallFit}%</b>)`:''}.`,1800))return;
        }
        if(!await step(`Placed <b>${name}</b> — re-predicting…`,900))return;
      }
      if(!await step('<b>Step 3</b> — Turn on <b>Plan</b> mode. The backend <b>arch.js</b> turns these rooms into walls and doors.',1400))return;
      if(!S.archOn)toggleArch();
      if(!await step('Generating walls and doors…',1800))return;
      await step('<b>Done.</b> Walls are classified into exterior/interior, doors open between rooms with high adjacency, and the connectivity net guarantees every room is reachable. Keep drawing — this panel keeps explaining alongside you.',100);
    }finally{ this._end(); }
  },
  _end(){
    this.demoOn=false;const btn=document.getElementById('btn-xp-demo');
    if(btn){btn.textContent='▶ Demo';btn.classList.remove('stop');}
    this.refresh();
  },
};
document.getElementById('btn-explain').addEventListener('click',()=>EXPLAIN.toggle());
document.getElementById('btn-xp-close').addEventListener('click',()=>EXPLAIN.toggle());
document.getElementById('btn-xp-demo').addEventListener('click',()=>EXPLAIN.demo());

// ─────────────────────────────────────────
//  GENERATE (diffusion) — run the trained DDPM, drop a refined apartment
//  onto the canvas. Self-contained; safe to remove with the top-bar button.
// ─────────────────────────────────────────
const GEN={model:null,busy:false};
const _gsilu=x=>x/(1+Math.exp(-x));
function _glin(x,W,b){const o=new Array(W.length);for(let r=0;r<W.length;r++){let s=b[r];const Wr=W[r];for(let i=0;i<x.length;i++)s+=Wr[i]*x[i];o[r]=s;}return o;}
function _gtemb(t,n){const half=n/2,o=new Array(n);for(let k=0;k<half;k++){const f=Math.exp(-Math.log(10000)*k/half),a=t*f;o[k]=Math.sin(a);o[half+k]=Math.cos(a);}return o;}
function _gden(x,t,M){let h=_glin(x.concat(_gtemb(t,M.temb)),M.w0,M.b0).map(_gsilu);h=_glin(h,M.w2,M.b2).map(_gsilu);return _glin(h,M.w4,M.b4);}
function _grandn(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function _gRefine(rooms){
  const quad=r=>(r.cx>=0?1:0)+(r.cy>=0?2:0),qcol=[0,1,0,1],qrow=[0,0,1,1],slot=[null,null,null,null];
  const order=[...rooms.keys()].sort((a,b)=>Math.hypot(rooms[a].cx,rooms[a].cy)-Math.hypot(rooms[b].cx,rooms[b].cy));
  for(const i of order){let q=quad(rooms[i]);if(slot[q]!=null){const free=[0,1,2,3].filter(k=>slot[k]==null);free.sort((a,b)=>(Math.abs(qcol[a]-qcol[q])+Math.abs(qrow[a]-qrow[q]))-(Math.abs(qcol[b]-qcol[q])+Math.abs(qrow[b]-qrow[q])));q=free[0];}slot[q]=i;}
  const R=q=>rooms[slot[q]];
  const colW=[Math.max(R(0).w,R(2).w),Math.max(R(1).w,R(3).w)],rowH=[Math.max(R(0).h,R(1).h),Math.max(R(2).h,R(3).h)];
  const cx=[0,colW[0]],cy=[0,rowH[0]],tW=colW[0]+colW[1],tH=rowH[0]+rowH[1];
  return [0,1,2,3].map(q=>({type:R(q).type,x:cx[qcol[q]]-tW/2,y:cy[qrow[q]]-tH/2,w:colW[qcol[q]],h:rowH[qrow[q]]}));
}
async function generateDiffusion(){
  if(GEN.busy)return;GEN.busy=true;
  const btn=document.getElementById('btn-gen');btn.textContent='…';btn.classList.add('on');
  try{
    if(!GEN.model){const r=await fetch('/diffusion/model.json');GEN.model=await r.json();}
    const M=GEN.model,T=M.T,b=M.betas,al=b.map(x=>1-x),abar=[];let acc=1;for(let i=0;i<T;i++){acc*=al[i];abar.push(acc);}
    let x=Array.from({length:M.dim},()=>_grandn());
    for(let t=T-1;t>=0;t--){const e=_gden(x,t,M);x=x.map((xi,i)=>(xi-b[t]/Math.sqrt(1-abar[t])*e[i])/Math.sqrt(al[t])+(t>0?Math.sqrt(b[t])*_grandn():0));}
    const rooms=[];for(let i=0;i<M.dim;i+=2){const ty=M.types[i/2];rooms.push({type:ty,cx:x[i],cy:x[i+1],w:M.size[ty][0],h:M.size[ty][1]});}
    const plan=_gRefine(rooms),SCALE=150,sc=SCENES.apartment;
    S.shapes=[];S.selIds=new Set();S.sceneKey='apartment';S.predHidden=true;
    for(const r of plan){const def=sc.types[r.type];S.shapes.push(mkRect(r.x*SCALE,r.y*SCALE,r.w*SCALE,r.h*SCALE,{fill:def.fill,stroke:def.stroke,roomType:r.type}));}
    // the model only knows 4 rooms — let the adjacency rules add a dining + corridor
    // so a full apartment (with kitchen AND dining next to each other) comes out.
    for(const t of ['dining','corridor']){
      const m=typeRangeMid(t);let pl=findPlacements(m.w,m.h,t),fw=m.w,fh=m.h;
      if(!pl.length){pl=findPlacements(m.h,m.w,t);fw=m.h;fh=m.w;}
      if(!pl.length)continue;
      const best=pl[0],def=sc.types[t];
      S.shapes.push(mkRect(best.x,best.y,fw,fh,{fill:def.fill,stroke:def.stroke,roomType:t}));
    }
    saveH();S.candidates=predictNextRooms();fitScreen();render();if(S.archOn)fetchArch();
    document.getElementById('s-tool').textContent='Generated (diffusion core + rule-placed dining/corridor)';
  }catch(e){alert('Generate needs /diffusion/model.json — run: python diffusion/diffuse.py');}
  finally{btn.textContent='Generate';btn.classList.remove('on');GEN.busy=false;}
}
document.getElementById('btn-gen').addEventListener('click',generateDiffusion);

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
(function init(){
  S.vx=(cW()-RW)/2;S.vy=(cH()-RW)/2;
  saveH();render();
})();

// Live sync: when the tuner changes the config, the server pushes an event and we
// re-fetch the plan instantly (only matters in Plan mode). Silently ignored if the
// page wasn't served by the backend (e.g. opened as a file://).
try{
  const es=new EventSource('/api/events');
  es.onmessage=e=>{try{if(JSON.parse(e.data).type==='config'&&S.archOn)fetchArch();}catch(_){}};
  // No live-sync endpoint (e.g. served statically on Vercel) → stop retrying so it isn't noisy.
  es.onerror=()=>{if(es.readyState===2/*CLOSED*/)es.close();};
}catch(_){}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>dtd2 · plan tuner</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F2F2EF;--border:#E3E2DE;--accent:#1D6AF5;--text:#1C1C1C;--muted:#8B8B8B;--surface:#fff}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.top{height:42px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.top .logo{font-size:13px;font-weight:700;letter-spacing:-.5px;opacity:.5}
.top .sub{font-size:11px;color:var(--muted)}
.top .sep{flex:1}
.scene-sel{display:flex;gap:4px}
.scene-sel button{border:1px solid var(--border);background:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:500;cursor:pointer;color:var(--muted)}
.scene-sel button.on{background:var(--accent);border-color:var(--accent);color:#fff}
.save{background:var(--text);color:#fff;border:none;border-radius:6px;padding:5px 14px;font-size:11px;font-weight:600;cursor:pointer}
.save:disabled{opacity:.4;cursor:default}
.saved{font-size:11px;color:#16A34A;font-weight:600;opacity:0;transition:opacity .2s}
.saved.show{opacity:1}
.main{flex:1;display:flex;overflow:hidden}
.panel{width:380px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:16px}
.preview{flex:1;display:flex;align-items:center;justify-content:center;position:relative;background:#FBFBFA}
#cv{background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.pv-note{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--muted)}
.sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:18px 0 9px}
.sec:first-child{margin-top:0}
.ctl{margin-bottom:13px}
.ctl .lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.ctl .lbl b{font-family:'SF Mono','Menlo',monospace;font-weight:600;color:var(--accent)}
.ctl input[type=range]{width:100%;accent-color:var(--accent)}
.ctl .hint{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.3}
.toggle{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer}
.matrix-wrap{overflow:auto;border:1px solid var(--border);border-radius:8px}
table{border-collapse:collapse;font-size:10px}
th,td{border:1px solid var(--border);padding:0;text-align:center}
th{background:#F7F7F5;font-weight:600;color:var(--muted);padding:4px 5px;white-space:nowrap;position:sticky;top:0}
th.row{position:sticky;left:0;z-index:1;text-align:right;padding-right:6px}
td input{width:34px;height:26px;border:none;text-align:center;font-family:'SF Mono','Menlo',monospace;font-size:11px;background:none;outline:none}
td input:focus{background:#EFF6FF}
td.diag{background:#F0F0EE}
td.hi{background:#E7F0FF}
.legend{font-size:10px;color:var(--muted);margin-top:7px;line-height:1.4}
</style>
</head>
<body>
<div class="top">
  <span class="logo">dtd2</span><span class="sub">plan tuner</span>
  <div class="scene-sel" id="scene-sel"></div>
  <div class="sep"></div>
  <span class="saved" id="saved">Saved ✓</span>
  <button class="save" id="save">Save to app</button>
</div>
<div class="main">
  <div class="panel" id="panel"></div>
  <div class="preview">
    <canvas id="cv" width="640" height="560"></canvas>
    <div class="pv-note" id="pvnote">live preview · changes apply to the app after Save</div>
  </div>
</div>

<script>
'use strict';
const API='';                 // same origin as the server
let CFG=null, scene='apartment', dirty=false;
const $=id=>document.getElementById(id);

// ── small baked sample layouts so the preview shows real walls/doors ──
const SAMPLES={
  apartment:[
    {type:'rect',x:0,y:0,w:200,h:160,roomType:'living'},
    {type:'rect',x:200,y:0,w:160,h:160,roomType:'bedroom'},
    {type:'rect',x:200,y:160,w:160,h:120,roomType:'bathroom'},
    {type:'rect',x:0,y:160,w:200,h:120,roomType:'kitchen'},
  ],
  office:[
    {type:'rect',x:0,y:0,w:180,h:160,roomType:'reception'},
    {type:'rect',x:180,y:0,w:220,h:160,roomType:'openoffice'},
    {type:'rect',x:0,y:160,w:180,h:140,roomType:'meeting'},
    {type:'rect',x:180,y:160,w:120,h:140,roomType:'restroom'},
  ],
  mall:[
    {type:'rect',x:0,y:0,w:200,h:160,roomType:'entrance'},
    {type:'rect',x:200,y:0,w:200,h:200,roomType:'atrium'},
    {type:'rect',x:0,y:160,w:200,h:160,roomType:'retail'},
    {type:'rect',x:200,y:200,w:200,h:120,roomType:'restroom'},
  ],
};

// ── load config, build UI ──
fetch(API+'/api/config').then(r=>r.json()).then(c=>{CFG=c;buildScenes();buildPanel();preview();});

function buildScenes(){
  const sel=$('scene-sel');sel.innerHTML='';
  for(const k of Object.keys(CFG.scenes)){
    const b=document.createElement('button');b.textContent=CFG.scenes[k].startType?k:k;b.className=k===scene?'on':'';
    b.onclick=()=>{scene=k;buildScenes();buildPanel();preview();};
    sel.appendChild(b);
  }
}

function buildPanel(){
  const p=$('panel');p.innerHTML='';
  // ── numeric params ──
  p.appendChild(sec('Door & wall parameters'));
  p.appendChild(slider('Door threshold','doorThreshold',0,5,1,'Adjacency weight needed to auto-open a door. Higher = fewer doors, more reliance on the connectivity net.'));
  p.appendChild(slider('Door width','doorWidth',24,100,2,'Width of each door opening (world units; 20 = 1ft).'));
  p.appendChild(slider('Exterior wall','wallExt',2,20,1,'Thickness of perimeter walls.'));
  p.appendChild(slider('Interior wall','wallInt',2,16,1,'Thickness of partition walls between rooms.'));
  const tg=document.createElement('label');tg.className='toggle';
  const cb=document.createElement('input');cb.type='checkbox';cb.checked=CFG.connectivity!==false;
  cb.onchange=()=>{CFG.connectivity=cb.checked;mark();preview();};
  tg.appendChild(cb);tg.appendChild(document.createTextNode('Connectivity safety net (never leave a room unreachable)'));
  const tgw=document.createElement('div');tgw.className='ctl';tgw.appendChild(tg);p.appendChild(tgw);

  // ── adjacency matrix ──
  p.appendChild(sec(scene+' · adjacency weights'));
  const types=CFG.scenes[scene].types, adj=CFG.scenes[scene].adj;
  const wrap=document.createElement('div');wrap.className='matrix-wrap';
  const tbl=document.createElement('table');
  const head=document.createElement('tr');head.appendChild(th('',''));
  for(const c of types)head.appendChild(th(short(c),'col'));
  tbl.appendChild(head);
  for(const a of types){
    const tr=document.createElement('tr');tr.appendChild(th(short(a),'row'));
    for(const b of types){
      const td=document.createElement('td');
      if(a===b){td.className='diag';}
      else{
        const inp=document.createElement('input');
        const val=(adj[a]&&adj[a][b])||0;inp.value=val;
        if(val>=CFG.doorThreshold)td.className='hi';
        inp.onchange=()=>{
          const v=Math.max(0,Math.min(9,parseInt(inp.value)||0));inp.value=v;
          if(!adj[a])adj[a]={};
          if(v)adj[a][b]=v;else delete adj[a][b];
          td.className=v>=CFG.doorThreshold?'hi':'';
          mark();preview();
        };
        td.appendChild(inp);
      }
      tr.appendChild(td);
    }
    tbl.appendChild(tr);
  }
  wrap.appendChild(tbl);p.appendChild(wrap);
  const lg=document.createElement('div');lg.className='legend';
  lg.innerHTML='Row → column weight (the generator uses the larger of the two directions). '+
    'Cells ≥ threshold are highlighted — those pairs get a door directly; weaker pairs only get one if the net needs it for connectivity.';
  p.appendChild(lg);
}

function sec(t){const d=document.createElement('div');d.className='sec';d.textContent=t;return d;}
function th(t,cls){const e=document.createElement('th');e.textContent=t;if(cls)e.className=cls;return e;}
function short(t){return t.length>7?t.slice(0,6)+'.':t;}
function slider(label,key,min,max,step,hint){
  const d=document.createElement('div');d.className='ctl';
  const l=document.createElement('div');l.className='lbl';
  const b=document.createElement('b');b.textContent=CFG[key];
  l.innerHTML='<span>'+label+'</span>';l.appendChild(b);
  const r=document.createElement('input');r.type='range';r.min=min;r.max=max;r.step=step;r.value=CFG[key];
  r.oninput=()=>{CFG[key]=parseFloat(r.value);b.textContent=CFG[key];mark();preview();
    if(key==='doorThreshold')buildPanel();}; // re-highlight matrix
  d.appendChild(l);d.appendChild(r);
  const h=document.createElement('div');h.className='hint';h.textContent=hint;d.appendChild(h);
  return d;
}

let applyTimer=null;
function mark(){dirty=true;$('saved').classList.remove('show');scheduleApply();}
function scheduleApply(){clearTimeout(applyTimer);applyTimer=setTimeout(applyConfig,350);} // auto-apply live
async function applyConfig(){
  try{
    await fetch(API+'/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(CFG)});
    dirty=false;$('saved').textContent='Applied to app ✓';$('saved').classList.add('show');
    setTimeout(()=>$('saved').classList.remove('show'),1400);
  }catch(e){}
}

// ── live preview (sends the unsaved config so changes show before saving) ──
let pvTimer=null;
function preview(){
  clearTimeout(pvTimer);
  pvTimer=setTimeout(async()=>{
    try{
      const res=await fetch(API+'/api/arch',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({shapes:SAMPLES[scene],sceneKey:scene,config:CFG})});
      const data=await res.json();drawPlan(data.runs||[]);
      const doors=(data.runs||[]).filter(r=>r.door).length;
      $('pvnote').textContent=`${doors} doors · ${(data.runs||[]).length} wall runs · live preview (apply with Save)`;
    }catch(e){$('pvnote').textContent='preview needs the server running (node server.js)';}
  },120);
}

const cv=$('cv'),ctx=cv.getContext('2d');
function drawPlan(runs){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(!runs.length)return;
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  for(const r of runs){minX=Math.min(minX,r.ax,r.bx);minY=Math.min(minY,r.ay,r.by);maxX=Math.max(maxX,r.ax,r.bx);maxY=Math.max(maxY,r.ay,r.by);}
  const pad=50,sc=Math.min((cv.width-pad*2)/(maxX-minX||1),(cv.height-pad*2)/(maxY-minY||1));
  const ox=(cv.width-(maxX-minX)*sc)/2-minX*sc,oy=(cv.height-(maxY-minY)*sc)/2-minY*sc;
  const X=x=>x*sc+ox,Y=y=>y*sc+oy;
  ctx.fillStyle='#2B2B2B';ctx.strokeStyle='#2B2B2B';
  for(const r of runs){
    const len=r.len||1,ux=(r.bx-r.ax)/len,uy=(r.by-r.ay)/len,t=r.t*sc;
    const seg=(t0,t1)=>{
      const ax=X(r.ax+ux*t0),ay=Y(r.ay+uy*t0),bx=X(r.ax+ux*t1),by=Y(r.ay+uy*t1),nx=-uy*t/2,ny=ux*t/2;
      ctx.beginPath();ctx.moveTo(ax+nx,ay+ny);ctx.lineTo(bx+nx,by+ny);ctx.lineTo(bx-nx,by-ny);ctx.lineTo(ax-nx,ay-ny);ctx.closePath();ctx.fill();
    };
    if(r.door){
      const [c0,c1]=r.door,dw=c1-c0;seg(0,c0);seg(c1,len);
      const hx=r.ax+ux*c0,hy=r.ay+uy*c0,tipx=hx+r.nx*dw,tipy=hy+r.ny*dw;
      ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(X(hx),Y(hy));ctx.lineTo(X(tipx),Y(tipy));ctx.stroke();
      let a0=Math.atan2(r.ny,r.nx),a1=Math.atan2(uy,ux),da=a1-a0;while(da>Math.PI)da-=2*Math.PI;while(da<-Math.PI)da+=2*Math.PI;
      ctx.lineWidth=1;ctx.beginPath();
      for(let k=0;k<=14;k++){const ang=a0+da*k/14,px=X(hx+Math.cos(ang)*dw),py=Y(hy+Math.sin(ang)*dw);k?ctx.lineTo(px,py):ctx.moveTo(px,py);}
      ctx.stroke();
    }else seg(0,len);
  }
}

$('save').onclick=async()=>{
  try{
    await fetch(API+'/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(CFG)});
    dirty=false;$('save').disabled=true;$('saved').classList.add('show');
    setTimeout(()=>$('saved').classList.remove('show'),1800);
  }catch(e){alert('Save failed — is the server running?');}
};
</script>
</body>
</html>
